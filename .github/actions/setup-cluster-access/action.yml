name: 'Setup Cluster Access'
description: 'Configure kubectl access to Veryfront K8s cluster. Works on both K8s runners (direct access) and GitHub-hosted runners (via Tailscale).'

inputs:
  op-service-account-token:
    description: 'OP_SERVICE_ACCOUNT_TOKEN for 1Password access'
    required: true
  tailscale-oauth-client-id:
    description: 'Tailscale OAuth client ID (for GitHub-hosted runners)'
    required: false
  tailscale-oauth-secret:
    description: 'Tailscale OAuth secret (for GitHub-hosted runners)'
    required: false

outputs:
  runner-type:
    description: 'Type of runner (k8s or github-hosted)'
    value: ${{ steps.runner-type.outputs.type }}

runs:
  using: 'composite'
  steps:
    - name: Check runner type
      id: runner-type
      shell: bash
      run: |
        if [[ -n "$KUBERNETES_SERVICE_HOST" ]]; then
          echo "type=k8s" >> $GITHUB_OUTPUT
          echo "::notice::Running on K8s runner - already on cluster network"
        else
          echo "type=github-hosted" >> $GITHUB_OUTPUT
          echo "::notice::Running on GitHub-hosted runner - need Tailscale for network access"
        fi

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4

    # For GitHub-hosted runners only: Install Tailscale for network access
    - name: Setup Tailscale
      if: steps.runner-type.outputs.type == 'github-hosted'
      uses: tailscale/github-action@v2
      with:
        oauth-client-id: ${{ inputs.tailscale-oauth-client-id }}
        oauth-secret: ${{ inputs.tailscale-oauth-secret }}
        tags: tag:ci

    # All runners: Get kubeconfig from 1Password
    - name: Get kubeconfig from 1Password
      shell: bash
      env:
        OP_SERVICE_ACCOUNT_TOKEN: ${{ inputs.op-service-account-token }}
      run: |
        # Install 1Password CLI if not present
        if ! command -v op &> /dev/null; then
          curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --dearmor --output /tmp/1password-archive-keyring.gpg
          echo "deb [arch=amd64 signed-by=/tmp/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main" | sudo tee /etc/apt/sources.list.d/1password.list
          sudo apt-get update && sudo apt-get install -y 1password-cli
        fi

        # Get kubeconfig
        mkdir -p ~/.kube
        op read "op://VERYFRONT_CI/KUBECONFIG/credential" > ~/.kube/config
        chmod 600 ~/.kube/config

    - name: Verify cluster access
      shell: bash
      run: |
        echo "Testing cluster connectivity..."
        if ! kubectl cluster-info --request-timeout=10s; then
          echo "::error::Failed to connect to cluster"
          exit 1
        fi
        echo "Connected to cluster successfully"
