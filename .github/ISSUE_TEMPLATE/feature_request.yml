name: Feature Request
description: Suggest an idea or enhancement for Veryfront
title: '[FEATURE] '
labels: ['enhancement']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to suggest a new feature! Please provide as much detail as possible to help us understand your idea.

  - type: textarea
    attributes:
      label: Problem Statement
      description: Is your feature request related to a problem? Please describe.
      placeholder: "I'd like to improve the experience when working with [feature/task] by adding..."
    validations:
      required: true

  - type: textarea
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: |
        A clear and concise description of what you want to happen.
    validations:
      required: true

  - type: dropdown
    attributes:
      label: Component
      description: Which component of Veryfront would this feature affect?
      multiple: true
      options:
        - Agents
        - Tools
        - Workflows
        - Memory & Streaming
        - Chat UI
        - Pages & Routing
        - Data Fetching
        - API Routes
        - MCP Server
        - CLI / TUI
        - Integrations
        - Deployment
        - Other
    validations:
      required: true

  - type: textarea
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
      placeholder: |
        Are there any workarounds or alternative approaches you're currently using?
    validations:
      required: false

  - type: textarea
    attributes:
      label: Example Use Case
      description: Provide an example of how you would use this feature.
      placeholder: |
        As a developer, I want to be able to [do something] so that I can [achieve some goal].
    validations:
      required: true

  - type: checkboxes
    attributes:
      label: Verification
      description: Before submitting, please make sure you've completed the following
      options:
        - label: I have searched the existing issues to make sure this is not a duplicate
          required: true
        - label: I have provided sufficient context for the team to understand the request
          required: true
