name: Publish to npm

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags like v0.0.67, v1.0.0

permissions:
  contents: write
  id-token: write

jobs:
  build-binaries:
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: veryfront-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: veryfront-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: veryfront-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: veryfront-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: veryfront-windows-x64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Build binary
        run: deno compile --allow-all --unstable-net --include=src/cli/templates/files --include=src/cli/templates/integrations --target ${{ matrix.target }} --output ${{ matrix.name }} src/cli/main.ts

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
          retention-days: 1

  publish:
    needs: build-binaries
    runs-on: veryfront-k8s-runners
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          NPM_TOKEN: op://VERYFRONT_CI/NPM_TOKEN/password
          VERYFRONT_RELEASE_TOKEN: op://VERYFRONT_CI/GITHUB_VERYFRONT_PAT/credential

      - name: Validate tag matches deno.json version
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          DENO_VERSION=$(jq -r '.version' deno.json)

          if [ "$TAG_VERSION" != "$DENO_VERSION" ]; then
            echo "Error: Tag version ($TAG_VERSION) doesn't match deno.json version ($DENO_VERSION)"
            echo "Please ensure deno.json version is updated before tagging."
            exit 1
          fi

          echo "Version validated: $TAG_VERSION"
          echo "VERSION=$TAG_VERSION" >> $GITHUB_ENV

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Update npm to latest for OIDC support
        run: npm install -g npm@latest

      - name: Build npm package
        run: deno task build:npm

      - name: Verify package version
        working-directory: npm
        run: |
          PKG_VERSION=$(jq -r '.version' package.json)
          if [ "$PKG_VERSION" != "$VERSION" ]; then
            echo "Error: Built package version ($PKG_VERSION) doesn't match tag ($VERSION)"
            exit 1
          fi
          echo "Package version verified: $PKG_VERSION"

      - name: Publish to npm
        working-directory: npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Download all binary artifacts
        uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: List binaries
        run: |
          echo "Downloaded binaries:"
          find binaries -type f -ls

      - name: Create GitHub Release in veryfront/veryfront
        uses: softprops/action-gh-release@v1
        with:
          repository: veryfront/veryfront
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          generate_release_notes: false
          body: |
            Veryfront CLI v${{ env.VERSION }}

            ## Install

            ```bash
            npm install -g veryfront
            # or
            npx veryfront
            ```

            ## Binary Downloads

            | Platform | Binary |
            |----------|--------|
            | macOS (Apple Silicon) | veryfront-macos-arm64 |
            | macOS (Intel) | veryfront-macos-x64 |
            | Linux (x64) | veryfront-linux-x64 |
            | Linux (ARM64) | veryfront-linux-arm64 |
            | Windows (x64) | veryfront-windows-x64.exe |
          files: |
            binaries/veryfront-macos-arm64/veryfront-macos-arm64
            binaries/veryfront-macos-x64/veryfront-macos-x64
            binaries/veryfront-linux-x64/veryfront-linux-x64
            binaries/veryfront-linux-arm64/veryfront-linux-arm64
            binaries/veryfront-windows-x64.exe/veryfront-windows-x64.exe
        env:
          GITHUB_TOKEN: ${{ env.VERYFRONT_RELEASE_TOKEN }}

      - name: Create GitHub Release in veryfront-renderer (for reference)
        uses: softprops/action-gh-release@v1
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
