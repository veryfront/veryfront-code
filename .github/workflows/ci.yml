name: CI

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # PARALLEL QUALITY CHECKS
  # ============================================

  format:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno fmt --check

  lint:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno task lint

  typecheck:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno task typecheck

  # ============================================
  # PARALLEL TEST JOBS
  # ============================================

  unit-tests:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - name: Cache esm.sh dependencies
        run: deno cache --reload=https://esm.sh src/mod.ts || true
      - name: Run Unit Tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: deno task test:unit --no-lock

  integration-tests:
    runs-on: veryfront-k8s-runners
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - name: Cache esm.sh dependencies
        run: deno cache --reload=https://esm.sh src/mod.ts || true
      - name: Run Integration Tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: VF_DISABLE_LRU_INTERVAL=1 deno task test:integration --no-lock

  # ============================================
  # CROSS-RUNTIME TESTS (Node.js & Bun)
  # Optional - runs in parallel with Deno tests
  # ============================================

  cross-runtime-tests:
    runs-on: veryfront-k8s-runners
    continue-on-error: true  # Don't fail the whole build if cross-runtime tests fail
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun]
        include:
          - runtime: node
            version: "22"
            command: "node --experimental-transform-types --import ./scripts/node-resolver.mjs --test 'src/**/*.test.ts'"
          - runtime: bun
            version: "latest"
            command: "bun test src/"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.version }}
      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.version }}
      - name: Run Tests (${{ matrix.runtime }})
        run: |
          VF_DISABLE_LRU_INTERVAL=1 NODE_ENV=production LOG_FORMAT=text ${{ matrix.command }}
        continue-on-error: true  # Tests may not pass yet on all runtimes

  # ============================================
  # PUBLISH PRE-RELEASE TO NPM
  # Only runs on push to main after tests pass
  # Publishes veryfront@{version}-rc.{run_number}
  # ============================================

  publish-prerelease:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [format, lint, typecheck, unit-tests, integration-tests]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          NPM_TOKEN: op://VERYFRONT_CI/NPM_TOKEN_VERYFRONT/password
          GITHUB_PAT: op://VERYFRONT_CI/GITHUB_VERYFRONT_PAT/credential

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Get base version and compute pre-release version
        id: version
        run: |
          BASE_VERSION=$(jq -r '.version' deno.json)
          PRERELEASE_VERSION="${BASE_VERSION}-rc.${{ github.run_number }}"
          echo "base_version=$BASE_VERSION" >> $GITHUB_OUTPUT
          echo "prerelease_version=$PRERELEASE_VERSION" >> $GITHUB_OUTPUT
          echo "Publishing pre-release: $PRERELEASE_VERSION"

      - name: Build npm package
        run: |
          VERYFRONT_VERSION=${{ steps.version.outputs.prerelease_version }} deno task build:npm

      - name: Verify and update package version
        working-directory: npm
        run: |
          # Update package.json with pre-release version
          jq '.version = "${{ steps.version.outputs.prerelease_version }}"' package.json > package.json.tmp
          mv package.json.tmp package.json
          echo "Package version: $(jq -r '.version' package.json)"

      - name: Publish pre-release to npm
        working-directory: npm
        run: npm publish --access public --tag rc
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - name: Trigger cloud-renderer deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.GITHUB_PAT }}
          repository: veryfront/veryfront-cloud-renderer
          event-type: npm-published
          client-payload: '{"version": "${{ steps.version.outputs.prerelease_version }}"}'
