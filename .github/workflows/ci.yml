name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Node.js (for esbuild binary)
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install esbuild binary
        run: |
          npm install esbuild@0.20.1
          echo "ESBUILD_BINARY_PATH=$(pwd)/node_modules/esbuild/bin/esbuild" >> $GITHUB_ENV

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}

      - name: Verify Formatting
        run: deno fmt --check

      - name: Lint
        run: deno task lint

      - name: Type Check
        run: deno task typecheck

      - name: Check Circular Dependencies
        continue-on-error: true
        run: deno task check:circular

      - name: Run Unit Tests
        run: deno task test:unit --no-lock

      - name: Run Integration Tests
        timeout-minutes: 10
        env:
          DENO_JOBS: 1
        run: deno task test:integration --no-lock

  build:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    strategy:
      matrix:
        include:
          - component: proxy
            dockerfile: Dockerfile.proxy
            image: veryfront/veryfront-proxy
          - component: renderer
            dockerfile: Dockerfile.renderer
            image: veryfront/veryfront-renderer
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Create/Update Kubernetes Secrets
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          # Create proxy secret
          kubectl create secret generic veryfront-proxy-secret \
            --namespace veryfront-production \
            --from-literal=APP_ENVIRONMENT="${{ secrets.APP_ENVIRONMENT_PRODUCTION }}" \
            --from-literal=AUTH_MS_URL="${{ secrets.AUTH_MS_URL_PRODUCTION }}" \
            --from-literal=OAUTH_CLIENT_ID="${{ secrets.OAUTH_CLIENT_ID_PRODUCTION }}" \
            --from-literal=OAUTH_CLIENT_SECRET="${{ secrets.OAUTH_CLIENT_SECRET_PRODUCTION }}" \
            --from-literal=OAUTH_PREVIEW_CLIENT_ID="${{ secrets.OAUTH_PREVIEW_CLIENT_ID_PRODUCTION }}" \
            --from-literal=OAUTH_PREVIEW_CLIENT_SECRET="${{ secrets.OAUTH_PREVIEW_CLIENT_SECRET_PRODUCTION }}" \
            --from-literal=OAUTH_PUBLIC_KEY="${{ secrets.OAUTH_PUBLIC_KEY_PRODUCTION }}" \
            --from-literal=PUBLIC_URL="${{ secrets.PUBLIC_URL_PRODUCTION }}" \
            --from-literal=REDIS_APP_SERVER_PASSWORD="${{ secrets.REDIS_APP_SERVER_PASSWORD_PRODUCTION }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL_PRODUCTION }}" \
            --from-literal=REPLICACHE_URL="${{ secrets.REPLICACHE_URL_PRODUCTION }}" \
            --from-literal=STUDIO_URL="${{ secrets.STUDIO_URL_PRODUCTION }}" \
            --from-literal=VERYFRONT_API_URL="${{ secrets.VERYFRONT_API_URL_PRODUCTION }}" \
            --from-literal=VERYFRONT_API_URL_PUBLIC="${{ secrets.VERYFRONT_API_URL_PUBLIC_PRODUCTION }}" \
            --from-literal=WS_URL="${{ secrets.WS_URL_PRODUCTION }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create renderer secret
          kubectl create secret generic veryfront-renderer-secret \
            --namespace veryfront-production \
            --from-literal=APP_ENVIRONMENT="${{ secrets.APP_ENVIRONMENT_PRODUCTION }}" \
            --from-literal=AUTH_MS_URL="${{ secrets.AUTH_MS_URL_PRODUCTION }}" \
            --from-literal=OAUTH_PUBLIC_KEY="${{ secrets.OAUTH_PUBLIC_KEY_PRODUCTION }}" \
            --from-literal=PUBLIC_URL="${{ secrets.PUBLIC_URL_PRODUCTION }}" \
            --from-literal=REPLICACHE_URL="${{ secrets.REPLICACHE_URL_PRODUCTION }}" \
            --from-literal=STUDIO_URL="${{ secrets.STUDIO_URL_PRODUCTION }}" \
            --from-literal=VERYFRONT_API_URL="${{ secrets.VERYFRONT_API_URL_PRODUCTION }}" \
            --from-literal=VERYFRONT_API_URL_PUBLIC="${{ secrets.VERYFRONT_API_URL_PUBLIC_PRODUCTION }}" \
            --from-literal=WS_URL="${{ secrets.WS_URL_PRODUCTION }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy via Helm
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          helm upgrade --install veryfront-renderer ./chart \
            --namespace veryfront-production \
            --set proxy.image.repository=${{ env.REGISTRY }}/veryfront/veryfront-proxy \
            --set proxy.image.tag=${{ needs.build.outputs.image_tag }} \
            --set renderer.image.repository=${{ env.REGISTRY }}/veryfront/veryfront-renderer \
            --set renderer.image.tag=${{ needs.build.outputs.image_tag }}
