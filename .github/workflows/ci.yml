name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # PARALLEL QUALITY CHECKS
  # ============================================

  format:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno fmt --check

  lint:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno task lint

  typecheck:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno task typecheck

  # ============================================
  # PARALLEL TEST JOBS
  # ============================================

  unit-tests:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - name: Cache esm.sh dependencies
        run: deno cache --reload=https://esm.sh src/mod.ts || true
      - name: Run Unit Tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: deno task test:unit --no-lock

  integration-tests:
    runs-on: veryfront-k8s-runners
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - name: Cache esm.sh dependencies
        run: deno cache --reload=https://esm.sh src/mod.ts || true
      - name: Run Integration Tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: VF_DISABLE_LRU_INTERVAL=1 deno task test:integration --no-lock

  # ============================================
  # BUILD (only on main, after all checks pass)
  # Uses buildx with registry cache for fast builds on ephemeral runners
  # ============================================

  build:
    needs: [format, lint, typecheck, unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: veryfront-k8s-runners
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Get base tag
        id: tag
        run: echo "base=$(sha256sum deno.json | cut -c1-16)" >> $GITHUB_OUTPUT

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if base image exists
        id: base
        run: |
          if docker manifest inspect ${{ env.REGISTRY }}/veryfront/veryfront-renderer-base:${{ steps.tag.outputs.base }} > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build and push base image (if missing)
        if: steps.base.outputs.exists == 'false'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: ${{ env.REGISTRY }}/veryfront/veryfront-renderer-base:${{ steps.tag.outputs.base }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/veryfront/veryfront-renderer-base:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/veryfront/veryfront-renderer-base:cache,mode=max

      - name: Build and push proxy
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.proxy
          push: true
          tags: |
            ${{ env.REGISTRY }}/veryfront/veryfront-proxy:${{ github.sha }}
            ${{ env.REGISTRY }}/veryfront/veryfront-proxy:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/veryfront/veryfront-proxy:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/veryfront/veryfront-proxy:cache,mode=max

      - name: Build and push renderer
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.renderer
          push: true
          tags: |
            ${{ env.REGISTRY }}/veryfront/veryfront-renderer:${{ github.sha }}
            ${{ env.REGISTRY }}/veryfront/veryfront-renderer:latest
          build-args: BASE_TAG=${{ steps.tag.outputs.base }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/veryfront/veryfront-renderer:cache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/veryfront/veryfront-renderer:cache,mode=max

  # ============================================
  # DEPLOY (only after build succeeds)
  # ============================================

  deploy:
    needs: build
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # Proxy OAuth
          OAUTH_CLIENT_ID: op://VERYFRONT_CI/PROXY_OAUTH_LIVE_PRODUCTION/client_id
          OAUTH_CLIENT_SECRET: op://VERYFRONT_CI/PROXY_OAUTH_LIVE_PRODUCTION/client_secret
          OAUTH_PREVIEW_CLIENT_ID: op://VERYFRONT_CI/PROXY_OAUTH_PREVIEW_PRODUCTION/client_id
          OAUTH_PREVIEW_CLIENT_SECRET: op://VERYFRONT_CI/PROXY_OAUTH_PREVIEW_PRODUCTION/client_secret
          # Cache
          REDIS_URL: op://VERYFRONT_CI/UPSTASH_REDIS_PRODUCTION/url
          # Observability
          OTEL_EXPORTER_OTLP_HEADERS: op://VERYFRONT_CI/GRAFANA/otlp_auth

      - uses: azure/setup-kubectl@v4
      - uses: azure/setup-helm@v4

      - name: Create/Update Kubernetes Secrets
        run: |
          kubectl create secret generic veryfront-proxy-secret \
            --namespace veryfront-production \
            --from-literal=OAUTH_CLIENT_ID="$OAUTH_CLIENT_ID" \
            --from-literal=OAUTH_CLIENT_SECRET="$OAUTH_CLIENT_SECRET" \
            --from-literal=OAUTH_PREVIEW_CLIENT_ID="$OAUTH_PREVIEW_CLIENT_ID" \
            --from-literal=OAUTH_PREVIEW_CLIENT_SECRET="$OAUTH_PREVIEW_CLIENT_SECRET" \
            --from-literal=REDIS_URL="$REDIS_URL" \
            --from-literal=VERYFRONT_API_BASE_URL="https://api.veryfront.com" \
            --from-literal=OTEL_EXPORTER_OTLP_HEADERS="$OTEL_EXPORTER_OTLP_HEADERS" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic veryfront-renderer-secret \
            --namespace veryfront-production \
            --from-literal=VERYFRONT_API_BASE_URL="https://api.veryfront.com/api" \
            --from-literal=REDIS_URL="$REDIS_URL" \
            --from-literal=OTEL_EXPORTER_OTLP_HEADERS="$OTEL_EXPORTER_OTLP_HEADERS" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy via Helm
        run: |
          helm upgrade --install veryfront-renderer ./chart \
            --namespace veryfront-production \
            --set proxy.image.repository=${{ env.REGISTRY }}/veryfront/veryfront-proxy \
            --set proxy.image.tag=${{ needs.build.outputs.image_tag }} \
            --set renderer.image.repository=${{ env.REGISTRY }}/veryfront/veryfront-renderer \
            --set renderer.image.tag=${{ needs.build.outputs.image_tag }} \
            --set proxy.ingress.enabled=true
