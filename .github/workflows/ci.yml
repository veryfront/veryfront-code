name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}

      - name: Verify Formatting
        run: deno fmt --check

      - name: Lint
        run: deno task lint

      - name: Type Check
        run: deno task typecheck

      - name: Check Circular Dependencies
        continue-on-error: true
        run: deno task check:circular

      - name: Run Unit Tests
        run: deno task test:unit --no-lock

      - name: Run Integration Tests
        timeout-minutes: 10
        env:
          DENO_JOBS: 1
        run: |
          # Run tests and capture output - ignore exit code due to known zod/v4 post-test error
          output=$(deno task test:integration --no-lock 2>&1) || true
          echo "$output"
          # Check if tests actually passed by looking for "0 failed" in output
          if echo "$output" | grep -q "| 0 failed"; then
            echo "✅ All tests passed"
            exit 0
          else
            echo "❌ Tests failed"
            exit 1
          fi

  build:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: proxy
            dockerfile: Dockerfile.proxy
            image: veryfront/veryfront-proxy
          - component: renderer
            dockerfile: Dockerfile.renderer
            image: veryfront/veryfront-renderer
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest

      - name: Build and push ${{ matrix.component }}
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Clone repository
        uses: actions/checkout@v4

      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Create/Update Kubernetes Secrets
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          # Create proxy secret (only secrets actually used in code)
          kubectl create secret generic veryfront-proxy-secret \
            --namespace veryfront-production \
            --from-literal=OAUTH_CLIENT_ID="${{ secrets.OAUTH_CLIENT_ID_PRODUCTION }}" \
            --from-literal=OAUTH_CLIENT_SECRET="${{ secrets.OAUTH_CLIENT_SECRET_PRODUCTION }}" \
            --from-literal=OAUTH_PREVIEW_CLIENT_ID="${{ secrets.OAUTH_PREVIEW_CLIENT_ID_PRODUCTION }}" \
            --from-literal=OAUTH_PREVIEW_CLIENT_SECRET="${{ secrets.OAUTH_PREVIEW_CLIENT_SECRET_PRODUCTION }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL_PRODUCTION }}" \
            --from-literal=VERYFRONT_API_BASE_URL="https://api.veryfront.com" \
            --from-literal=OTEL_EXPORTER_OTLP_HEADERS="${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create renderer secret (only secrets actually used in code)
          kubectl create secret generic veryfront-renderer-secret \
            --namespace veryfront-production \
            --from-literal=VERYFRONT_API_URL="${{ secrets.VERYFRONT_API_URL_PRODUCTION }}" \
            --from-literal=OTEL_EXPORTER_OTLP_HEADERS="${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy via Helm
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          helm upgrade --install veryfront-renderer ./chart \
            --namespace veryfront-production \
            --set proxy.image.repository=${{ env.REGISTRY }}/veryfront/veryfront-proxy \
            --set proxy.image.tag=${{ needs.build.outputs.image_tag }} \
            --set renderer.image.repository=${{ env.REGISTRY }}/veryfront/veryfront-renderer \
            --set renderer.image.tag=${{ needs.build.outputs.image_tag }} \
            --set proxy.ingress.enabled=true
