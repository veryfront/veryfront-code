name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # PARALLEL QUALITY CHECKS
  # ============================================

  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno fmt --check

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno task lint

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno task typecheck

  # ============================================
  # PARALLEL TEST JOBS
  # ============================================

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno task test:unit --no-lock

  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - name: Run Integration Tests
        env:
          DENO_JOBS: 1
        run: |
          output=$(deno task test:integration --no-lock 2>&1) || true
          echo "$output"
          if echo "$output" | grep -q "| 0 failed"; then
            echo "✅ All tests passed"
            exit 0
          else
            echo "❌ Tests failed"
            exit 1
          fi

  # ============================================
  # BUILD (only on main, after all checks pass)
  # ============================================

  build:
    needs: [format, lint, typecheck, unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: proxy
            dockerfile: Dockerfile.proxy
            image: veryfront/veryfront-proxy
          - component: renderer
            dockerfile: Dockerfile.renderer
            image: veryfront/veryfront-renderer
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # DEPLOY (only after build succeeds)
  # ============================================

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: tailscale/github-action@v2
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:ci
      - uses: azure/setup-kubectl@v3
      - uses: azure/setup-helm@v4
      - name: Create/Update Kubernetes Secrets
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          kubectl create secret generic veryfront-proxy-secret \
            --namespace veryfront-production \
            --from-literal=OAUTH_CLIENT_ID="${{ secrets.OAUTH_CLIENT_ID_PRODUCTION }}" \
            --from-literal=OAUTH_CLIENT_SECRET="${{ secrets.OAUTH_CLIENT_SECRET_PRODUCTION }}" \
            --from-literal=OAUTH_PREVIEW_CLIENT_ID="${{ secrets.OAUTH_PREVIEW_CLIENT_ID_PRODUCTION }}" \
            --from-literal=OAUTH_PREVIEW_CLIENT_SECRET="${{ secrets.OAUTH_PREVIEW_CLIENT_SECRET_PRODUCTION }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL_PRODUCTION }}" \
            --from-literal=VERYFRONT_API_BASE_URL="https://api.veryfront.com" \
            --from-literal=OTEL_EXPORTER_OTLP_HEADERS="${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic veryfront-renderer-secret \
            --namespace veryfront-production \
            --from-literal=VERYFRONT_API_URL="${{ secrets.VERYFRONT_API_URL_PRODUCTION }}" \
            --from-literal=REDIS_URL="${{ secrets.REDIS_URL_PRODUCTION }}" \
            --from-literal=OTEL_EXPORTER_OTLP_HEADERS="${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy via Helm
        run: |
          echo "${{ secrets.KUBECONFIG_PRODUCTION }}" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig

          helm upgrade --install veryfront-renderer ./chart \
            --namespace veryfront-production \
            --set proxy.image.repository=${{ env.REGISTRY }}/veryfront/veryfront-proxy \
            --set proxy.image.tag=${{ needs.build.outputs.image_tag }} \
            --set renderer.image.repository=${{ env.REGISTRY }}/veryfront/veryfront-renderer \
            --set renderer.image.tag=${{ needs.build.outputs.image_tag }} \
            --set proxy.ingress.enabled=true
