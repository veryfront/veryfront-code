name: CI/CD

on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io

jobs:
  # ============================================
  # PARALLEL QUALITY CHECKS
  # ============================================

  format:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno fmt --check

  lint:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno task lint

  typecheck:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - run: deno task typecheck

  # ============================================
  # PARALLEL TEST JOBS
  # ============================================

  unit-tests:
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - name: Cache esm.sh dependencies
        run: deno cache --reload=https://esm.sh src/mod.ts || true
      - name: Run Unit Tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: deno task test:unit --no-lock

  integration-tests:
    runs-on: veryfront-k8s-runners
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts
          cache: true
          cache-hash: ${{ hashFiles('deno.json') }}
      - name: Cache esm.sh dependencies
        run: deno cache --reload=https://esm.sh src/mod.ts || true
      - name: Run Integration Tests
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 10
          command: VF_DISABLE_LRU_INTERVAL=1 deno task test:integration --no-lock

  # ============================================
  # BUILD (only on main, after all checks pass)
  # Uses GHA cache with matrix for parallel builds
  # ============================================

  build:
    needs: [format, lint, typecheck, unit-tests, integration-tests]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ github.sha }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: proxy
            dockerfile: Dockerfile.proxy
            image: veryfront/veryfront-proxy
          - component: renderer
            dockerfile: Dockerfile.renderer
            image: veryfront/veryfront-renderer
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ matrix.image }}
          tags: |
            type=raw,value=${{ github.sha }}
            type=raw,value=latest
      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}

  # ============================================
  # DEPLOY (only after build succeeds)
  # ============================================

  deploy:
    needs: build
    runs-on: veryfront-k8s-runners
    steps:
      - uses: actions/checkout@v4

      # Setup cluster access (kubectl + kubeconfig from 1Password)
      - uses: ./.github/actions/setup-cluster-access
        with:
          op-service-account-token: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          tailscale-oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          tailscale-oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}

      - uses: azure/setup-helm@v4

      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        with:
          export-env: true
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          # Proxy OAuth
          OAUTH_CLIENT_ID: op://VERYFRONT_CI/PROXY_OAUTH_LIVE_PRODUCTION/client_id
          OAUTH_CLIENT_SECRET: op://VERYFRONT_CI/PROXY_OAUTH_LIVE_PRODUCTION/client_secret
          OAUTH_PREVIEW_CLIENT_ID: op://VERYFRONT_CI/PROXY_OAUTH_PREVIEW_PRODUCTION/client_id
          OAUTH_PREVIEW_CLIENT_SECRET: op://VERYFRONT_CI/PROXY_OAUTH_PREVIEW_PRODUCTION/client_secret
          # Cache
          REDIS_URL: op://VERYFRONT_CI/UPSTASH_REDIS_PRODUCTION/url
          # Observability
          OTEL_EXPORTER_OTLP_HEADERS: op://VERYFRONT_CI/GRAFANA/otlp_auth

      - name: Create/Update Kubernetes Secrets
        run: |
          kubectl create secret generic veryfront-proxy-secret \
            --namespace veryfront-production \
            --from-literal=OAUTH_CLIENT_ID="$OAUTH_CLIENT_ID" \
            --from-literal=OAUTH_CLIENT_SECRET="$OAUTH_CLIENT_SECRET" \
            --from-literal=OAUTH_PREVIEW_CLIENT_ID="$OAUTH_PREVIEW_CLIENT_ID" \
            --from-literal=OAUTH_PREVIEW_CLIENT_SECRET="$OAUTH_PREVIEW_CLIENT_SECRET" \
            --from-literal=REDIS_URL="$REDIS_URL" \
            --from-literal=VERYFRONT_API_BASE_URL="https://api.veryfront.com" \
            --from-literal=OTEL_EXPORTER_OTLP_HEADERS="$OTEL_EXPORTER_OTLP_HEADERS" \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic veryfront-renderer-secret \
            --namespace veryfront-production \
            --from-literal=VERYFRONT_API_BASE_URL="https://api.veryfront.com/api" \
            --from-literal=REDIS_URL="$REDIS_URL" \
            --from-literal=OTEL_EXPORTER_OTLP_HEADERS="$OTEL_EXPORTER_OTLP_HEADERS" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy via Helm
        run: |
          helm upgrade --install veryfront-renderer ./chart \
            --namespace veryfront-production \
            --set proxy.image.repository=${{ env.REGISTRY }}/veryfront/veryfront-proxy \
            --set proxy.image.tag=${{ needs.build.outputs.image_tag }} \
            --set renderer.image.repository=${{ env.REGISTRY }}/veryfront/veryfront-renderer \
            --set renderer.image.tag=${{ needs.build.outputs.image_tag }} \
            --set proxy.ingress.enabled=true
