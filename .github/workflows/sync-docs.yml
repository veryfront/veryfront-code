name: Sync Docs

on:
  push:
    branches: [main]
    paths:
      - "src/**/index.ts"
      - "src/**/types.ts"
      - "scripts/docs/**"
      - "deno.json"
  workflow_dispatch:

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_VERYFRONT }}
          repository: veryfront/docs
          event-type: docs-update
          client-payload: '{"sha": "${{ github.sha }}"}'
