name: Security Audit

on:
  pull_request:
    branches: [main]
    paths:
      - "deno.json"
      - "cli/deno.json"
      - "react/deno.json"
      - "extensions/**/deno.json"
      - "scripts/build/generate-sbom.ts"
      - "scripts/lib/deno-lock.ts"
      - "scripts/lint/audit-core-deps.ts"
      - "scripts/lint/audit-dependency-boundaries.ts"
      - "scripts/lint/audit-deps.ts"
      - "scripts/security/**"
      - ".github/workflows/security-audit.yml"
  push:
    # No path filter: deno.lock is gitignored, and `npm:` specifiers live both
    # in deno.json and inline in source files. A broad trigger keeps the
    # dependency graph in sync with whatever lands on main.
    branches: [main]
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  npm-audit:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    name: NPM Dependency Audit
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-deno

      - name: Run npm dependency audit
        run: deno task audit

      - name: Run dependency lint
        run: deno task lint:deps

      - name: Run core dependency lint
        run: deno task lint:core-deps

      - name: Run dependency boundary lint
        run: deno task lint:dependency-boundaries

      - name: Run extension contract metadata lint
        run: deno task lint:extension-contracts

      - name: Run extension capability policy lint
        run: deno task lint:extension-capabilities

      - name: Generate separated dependency SBOMs
        run: deno task sbom:all --output-dir dist/dependency-sboms

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dependency-sboms
          path: |
            dist/dependency-sboms/*.json
            dist/dependency-sboms/*.md
          retention-days: 14

  submit-dependency-snapshot:
    # Only push/schedule/manual — PRs from forks lack write access.
    if: ${{ github.event_name != 'pull_request' && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    name: Submit Dependency Snapshot
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: ./.github/actions/setup-deno

      - name: Submit deno.lock graph to GitHub
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: deno task submit-deps
