name: Security Audit

on:
  pull_request:
    branches: [main]
    paths:
      - "deno.json"
  schedule:
    # Run weekly on Monday at 06:00 UTC
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    name: NPM Dependency Audit
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-deno

      - name: Run npm dependency audit
        run: deno task audit

      - name: Run dependency lint
        run: deno task lint:deps

  osv-scan:
    runs-on: ubuntu-latest
    name: OSV-Scanner (deno.lock)
    permissions:
      # `actions: read` is required by github/codeql-action/upload-sarif
      # (see https://github.com/github/codeql-action/issues/2117).
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v5
      - uses: ./.github/actions/setup-deno

      # `deno.lock` is `.gitignore`d in this repo; generate it before the scan
      # by populating the dependency cache from `deno.json`.
      - name: Generate deno.lock
        run: deno cache deno.json

      # The top-level `google/osv-scanner-action` is metadata only; the real
      # scanner lives under `osv-scanner-action/`. That sub-action accepts
      # only `scan-args`, so SARIF upload and fail-on-vuln are handled in
      # subsequent steps.
      # TODO: pin to SHA once the security-audit workflow is otherwise stable.
      - name: Run OSV-Scanner
        id: osv
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: |-
            --format=sarif
            --output=results.sarif
            --lockfile=deno.lock
        continue-on-error: true

      - name: Upload SARIF to code scanning
        if: ${{ !cancelled() }}
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: results.sarif

      - name: Fail if vulnerabilities found
        if: steps.osv.outcome == 'failure'
        run: exit 1
