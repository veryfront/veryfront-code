name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # CI: Quality Checks (PR + main, skip tags)
  # ============================================

  ci:
    if: startsWith(github.ref, 'refs/tags/') == false
    runs-on: veryfront-k8s-runners
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno
      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            format) deno fmt --check ;;
            lint) deno task lint ;;
            typecheck) deno task typecheck ;;
          esac

  # ============================================
  # CI: Tests (PR + main, skip tags)
  # ============================================

  tests:
    if: startsWith(github.ref, 'refs/tags/') == false
    runs-on: veryfront-k8s-runners
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno
        with:
          warm-cache: 'true'
      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: ${{ matrix.suite == 'integration' && 10 || 5 }}
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            if [ "${{ matrix.suite }}" = "integration" ]; then
              VF_DISABLE_LRU_INTERVAL=1 deno task test:integration --no-lock
            else
              deno task test:unit --no-lock
            fi

  # ============================================
  # CD: Calculate Version (single source of truth)
  # ============================================

  version:
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || startsWith(github.ref, 'refs/tags/v')
    needs: [ci, tests]
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - name: Calculate version
        id: version
        run: |
          BASE_VERSION=$(jq -r '.version' deno.json)
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${{ github.ref_name }}"
            VERSION="${VERSION#v}"
          else
            VERSION="${BASE_VERSION}-rc.${{ github.run_number }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  # ============================================
  # CD: Build Binaries (main + tags)
  # ============================================

  build-binaries:
    needs: [version]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: veryfront-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: veryfront-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: veryfront-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: veryfront-linux-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: veryfront-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Bake version into binary
        shell: bash
        run: |
          VERSION="${{ needs.version.outputs.version }}"
          echo "Building version: $VERSION"
          jq ".version = \"$VERSION\"" deno.json > deno.json.tmp && mv deno.json.tmp deno.json

      - run: deno run -A scripts/generate-templates-manifest.ts

      - name: Compile binary
        shell: bash
        run: |
          # React is fetched at runtime through the module server (SSR transform pipeline)
          # Include Tailwind CSS v4 plugins (versions must match PINNED_PLUGIN_VERSIONS in tailwind-compiler.ts)
          deno compile --allow-all --unstable-net \
            --include "https://esm.sh/tailwindcss-animate@1.0.7" \
            --include "https://esm.sh/@tailwindcss/typography@0.5.19" \
            --include "https://esm.sh/@tailwindcss/forms@0.5.11" \
            --include "https://esm.sh/tailwind-scrollbar-hide@2.0.0" \
            --include "https://esm.sh/daisyui@5.5.14" \
            --target ${{ matrix.target }} --output ${{ matrix.name }} src/cli/main.ts

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
          retention-days: 7

  # ============================================
  # CD: Pre-release (main only)
  # ============================================

  prerelease:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [version, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            # Install 1Password CLI
            curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --dearmor --output /tmp/1password-archive-keyring.gpg
            echo "deb [arch=amd64 signed-by=/tmp/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main" | sudo tee /etc/apt/sources.list.d/1password.list
            sudo apt-get update && sudo apt-get install -y 1password-cli

            # Fetch secrets with retry
            NPM_TOKEN=$(op read "op://VERYFRONT_CI/NPM_TOKEN_VERYFRONT/password")
            GITHUB_PAT=$(op read "op://VERYFRONT_CI/GITHUB_VERYFRONT_PAT/credential")

            # Export to GITHUB_ENV (masked)
            echo "::add-mask::$NPM_TOKEN"
            echo "::add-mask::$GITHUB_PAT"
            echo "NPM_TOKEN=$NPM_TOKEN" >> $GITHUB_ENV
            echo "GITHUB_PAT=$GITHUB_PAT" >> $GITHUB_ENV
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Build and publish
        env:
          VERSION: ${{ needs.version.outputs.version }}
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}
        run: |
          VERYFRONT_VERSION=$VERSION deno task build:npm
          cd npm && jq ".version = \"$VERSION\"" package.json > package.json.tmp && mv package.json.tmp package.json
          npm publish --access public --tag rc

      - uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create GitHub releases
        env:
          VERSION: ${{ needs.version.outputs.version }}
          GH_TOKEN: ${{ env.GITHUB_PAT }}
        run: |
          # Public repo release
          gh release create "v${VERSION}" \
            --repo veryfront/veryfront \
            --title "v${VERSION}" \
            --notes '```bash
          npx veryfront@'"${VERSION}"'
          ```' \
            binaries/veryfront-macos-arm64/veryfront-macos-arm64 \
            binaries/veryfront-macos-x64/veryfront-macos-x64 \
            binaries/veryfront-linux-x64/veryfront-linux-x64 \
            binaries/veryfront-linux-arm64/veryfront-linux-arm64 \
            binaries/veryfront-windows-x64.exe/veryfront-windows-x64.exe

      - name: Create source repo release
        run: |
          gh release create "v${{ needs.version.outputs.version }}" \
            --title "v${{ needs.version.outputs.version }}" \
            --notes 'Binaries available at: https://github.com/veryfront/veryfront/releases/tag/v${{ needs.version.outputs.version }}'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger cloud-renderer deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.GITHUB_PAT }}
          repository: veryfront/veryfront-cloud-renderer
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ needs.version.outputs.version }}"}'

  # ============================================
  # CD: Stable Release (tags only)
  # ============================================

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [version, build-binaries]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            # Install 1Password CLI
            curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --dearmor --output /tmp/1password-archive-keyring.gpg
            echo "deb [arch=amd64 signed-by=/tmp/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main" | sudo tee /etc/apt/sources.list.d/1password.list
            sudo apt-get update && sudo apt-get install -y 1password-cli

            # Fetch secrets with retry
            NPM_TOKEN=$(op read "op://VERYFRONT_CI/NPM_TOKEN_VERYFRONT/password")
            GITHUB_PAT=$(op read "op://VERYFRONT_CI/GITHUB_VERYFRONT_PAT/credential")

            # Export to GITHUB_ENV (masked)
            echo "::add-mask::$NPM_TOKEN"
            echo "::add-mask::$GITHUB_PAT"
            echo "NPM_TOKEN=$NPM_TOKEN" >> $GITHUB_ENV
            echo "GITHUB_PAT=$GITHUB_PAT" >> $GITHUB_ENV
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Validate version
        run: |
          VERSION="${GITHUB_REF#refs/tags/v}"
          DENO_VERSION=$(jq -r '.version' deno.json)
          if [ "$VERSION" != "$DENO_VERSION" ]; then
            echo "Error: Tag ($VERSION) doesn't match deno.json ($DENO_VERSION)"
            exit 1
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - run: npm install -g npm@latest

      - name: Build and publish
        run: |
          deno task build:npm
          cd npm && npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ env.NPM_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create GitHub releases
        run: |
          # Public repo release with binaries and install scripts
          gh release create "v${VERSION}" \
            --repo veryfront/veryfront \
            --title "v${VERSION}" \
            --notes '## Install

          ```bash
          # macOS/Linux
          curl -fsSL https://veryfront.com/install.sh | sh

          # npm
          npm install -g veryfront
          ```' \
            binaries/veryfront-macos-arm64/veryfront-macos-arm64 \
            binaries/veryfront-macos-x64/veryfront-macos-x64 \
            binaries/veryfront-linux-x64/veryfront-linux-x64 \
            binaries/veryfront-linux-arm64/veryfront-linux-arm64 \
            binaries/veryfront-windows-x64.exe/veryfront-windows-x64.exe \
            scripts/install.sh \
            scripts/install.ps1
        env:
          GH_TOKEN: ${{ env.GITHUB_PAT }}

      - name: Create source repo release
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --notes 'Binaries available at: https://github.com/veryfront/veryfront/releases/tag/v'"${VERSION}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger cloud-renderer deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ env.GITHUB_PAT }}
          repository: veryfront/veryfront-cloud-renderer
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ env.VERSION }}"}'

  # ============================================
  # CD: Update Homebrew (tags only)
  # ============================================

  update-homebrew:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Load secrets from 1Password
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 3
          max_attempts: 5
          retry_wait_seconds: 10
          command: |
            # Install 1Password CLI
            curl -sS https://downloads.1password.com/linux/keys/1password.asc | gpg --dearmor --output /tmp/1password-archive-keyring.gpg
            echo "deb [arch=amd64 signed-by=/tmp/1password-archive-keyring.gpg] https://downloads.1password.com/linux/debian/amd64 stable main" | sudo tee /etc/apt/sources.list.d/1password.list
            sudo apt-get update && sudo apt-get install -y 1password-cli

            # Fetch secrets with retry
            GITHUB_PAT=$(op read "op://VERYFRONT_CI/GITHUB_VERYFRONT_PAT/credential")

            # Export to GITHUB_ENV (masked)
            echo "::add-mask::$GITHUB_PAT"
            echo "GITHUB_PAT=$GITHUB_PAT" >> $GITHUB_ENV
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}

      - name: Update Homebrew tap
        uses: nick-fields/retry@v3
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            VERSION="${GITHUB_REF#refs/tags/v}"

            # Download binaries and calculate checksums
            declare -A SHAS
            for binary in veryfront-macos-arm64 veryfront-macos-x64 veryfront-linux-arm64 veryfront-linux-x64; do
              curl -fsSL "https://github.com/veryfront/veryfront/releases/download/v${VERSION}/${binary}" -o "${binary}"
              SHAS[$binary]=$(sha256sum "${binary}" | cut -d' ' -f1)
            done

            # Generate formula from template
            FORMULA=$(cat homebrew/veryfront.rb)
            FORMULA="${FORMULA//VERSION_PLACEHOLDER/$VERSION}"
            FORMULA="${FORMULA//SHA256_MACOS_ARM64_PLACEHOLDER/${SHAS[veryfront-macos-arm64]}}"
            FORMULA="${FORMULA//SHA256_MACOS_X64_PLACEHOLDER/${SHAS[veryfront-macos-x64]}}"
            FORMULA="${FORMULA//SHA256_LINUX_ARM64_PLACEHOLDER/${SHAS[veryfront-linux-arm64]}}"
            FORMULA="${FORMULA//SHA256_LINUX_X64_PLACEHOLDER/${SHAS[veryfront-linux-x64]}}"

            # Push to tap repo (fresh clone each retry to avoid conflicts)
            rm -rf tap
            git clone "https://x-access-token:${GITHUB_PAT}@github.com/veryfront/homebrew-tap.git" tap
            mkdir -p tap/Formula
            echo "$FORMULA" > tap/Formula/veryfront.rb
            cd tap
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add Formula/veryfront.rb
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            git commit -m "Update veryfront to v${VERSION}"
            git push
