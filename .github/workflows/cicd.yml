name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'pull_request' && format('{0}-{1}', github.workflow, github.ref) || format('{0}-{1}-{2}', github.workflow, github.ref, github.sha) }}
  # Only cancel superseded pull_request runs. Never cancel push runs on main:
  # a push run can be publishing a stable release (npm publish, git tag, GitHub
  # release, downstream deploy dispatch), and cancelling it mid-publish leaves a
  # partially released version. Push runs also need unique groups because
  # GitHub keeps at most one pending run per concurrency group; a later main
  # push can otherwise replace an earlier queued release run even when
  # cancel-in-progress is false. See veryfront-studio#5544.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  # ============================================
  # CI: Quality Checks
  # ============================================
  ci:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, typecheck]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-deno
      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            format) deno fmt --check ;;
            lint) deno task lint && deno task lint:core-deps && deno task lint:dependency-boundaries && deno task lint:extension-contracts && deno task lint:extension-capabilities && deno task lint:ban-test-only && deno task lint:sanitizer-baseline && deno task lint:skipped-tests ;;
            typecheck) deno task typecheck ;;
          esac

  # ============================================
  # CI: Tests
  # ============================================

  tests:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, integration]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-deno
        with:
          warm-cache: "true"
          warm-redis-cache: "true"
      - uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: ${{ matrix.suite == 'integration' && 10 || 5 }}
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            if [ "${{ matrix.suite }}" = "integration" ]; then
              VF_DISABLE_LRU_INTERVAL=1 deno task test:integration --no-lock
            else
              deno task test:unit --no-lock
            fi

  coverage-shards:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: coverage shard ${{ matrix.shard }}/8
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-deno
        with:
          warm-cache: "true"
          warm-redis-cache: "true"
      - name: Run unit coverage shard
        id: coverage
        run: |
          START=$(date +%s)
          deno task coverage:ci:shard -- --shard=${{ matrix.shard }}/8 --coverage-dir=coverage-shard-${{ matrix.shard }}
          echo "duration=$(($(date +%s) - START))s" >> "$GITHUB_OUTPUT"
      - name: Upload unit coverage lcov
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: coverage-shard-${{ matrix.shard }}
          path: coverage-shard-${{ matrix.shard }}/lcov.info
          retention-days: 1
      - name: Add coverage shard summary
        run: echo "### Coverage shard ${{ matrix.shard }}/8 completed in ${{ steps.coverage.outputs.duration }}" >> "$GITHUB_STEP_SUMMARY"

  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: coverage gate
    needs: [coverage-shards]
    if: ${{ always() && (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) }}
    steps:
      - name: Require coverage shards
        env:
          COVERAGE_SHARDS_RESULT: ${{ needs.coverage-shards.result }}
        run: |
          if [ "$COVERAGE_SHARDS_RESULT" != "success" ]; then
            echo "::error::Coverage shards finished with $COVERAGE_SHARDS_RESULT"
            exit 1
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-deno
      - name: Download unit coverage lcov files
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: coverage-profiles
          pattern: coverage-shard-*
      - name: Run coverage gate
        id: coverage
        run: |
          START=$(date +%s)
          deno task coverage:ci:merge coverage-profiles/coverage-shard-*
          echo "duration=$(($(date +%s) - START))s" >> "$GITHUB_OUTPUT"
      - name: Add coverage summary
        run: echo "### Coverage shard merge completed in ${{ steps.coverage.outputs.duration }}" >> "$GITHUB_STEP_SUMMARY"

  tests-e2e-rsc-browser:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 25
    name: tests (rsc browser e2e)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-deno
        with:
          warm-cache: "true"
      - name: Configure apt retries and mirrors
        run: |
          sudo sed -i \
            -e 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
            -e 's|http://security.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          {
            echo 'Acquire::ForceIPv4 "true";'
            echo 'Acquire::Retries "5";'
            echo 'Acquire::http::Timeout "30";'
            echo 'Acquire::https::Timeout "30";'
          } | sudo tee /etc/apt/apt.conf.d/99veryfront-ci-retries
      - name: Install Chromium
        run: |
          wait_for_apt_locks() {
            for _ in $(seq 1 60); do
              if ! sudo fuser /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock >/dev/null 2>&1; then
                return 0
              fi
              sleep 5
            done
            return 1
          }

          for attempt in 1 2 3; do
            wait_for_apt_locks
            timeout 10m deno run -A npm:playwright install --with-deps chromium && exit 0
            status=$?

            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            wait_for_apt_locks || true
            sudo apt-get clean || true
            sudo rm -rf /var/lib/apt/lists/* || true
            sleep $((attempt * 20))
          done
      - uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 2
          retry_wait_seconds: 10
          command: deno task test:e2e:rsc-browser

  # ============================================
  # CI: Compiled Binary E2E Tests
  # ============================================

  tests-binary-e2e:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 60
    name: tests (binary e2e)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-deno
        with:
          warm-cache: "true"
      - name: Configure apt retries and mirrors
        run: |
          sudo sed -i \
            -e 's|http://azure.archive.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
            -e 's|http://security.ubuntu.com/ubuntu|http://archive.ubuntu.com/ubuntu|g' \
            /etc/apt/sources.list /etc/apt/sources.list.d/ubuntu.sources 2>/dev/null || true
          {
            echo 'Acquire::ForceIPv4 "true";'
            echo 'Acquire::Retries "5";'
            echo 'Acquire::http::Timeout "30";'
            echo 'Acquire::https::Timeout "30";'
          } | sudo tee /etc/apt/apt.conf.d/99veryfront-ci-retries
      - name: Install Chromium
        run: |
          wait_for_apt_locks() {
            for _ in $(seq 1 60); do
              if ! sudo fuser /var/lib/dpkg/lock-frontend /var/lib/dpkg/lock /var/cache/apt/archives/lock >/dev/null 2>&1; then
                return 0
              fi
              sleep 5
            done
            return 1
          }

          for attempt in 1 2 3; do
            wait_for_apt_locks
            timeout 10m deno run -A npm:playwright install --with-deps chromium && exit 0
            status=$?

            if [ "$attempt" -eq 3 ]; then
              exit "$status"
            fi

            wait_for_apt_locks || true
            sudo apt-get clean || true
            sudo rm -rf /var/lib/apt/lists/* || true
            sleep $((attempt * 20))
          done
      - uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        with:
          timeout_minutes: 30
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            VERYFRONT_BINARY_FRESH=1 deno task test:e2e:binary

  # ============================================
  # CI: npm Install Smoke
  # ============================================

  # Clean-room install of the generated npm packages under Node: bare-install
  # CLI startup, optional-peer metadata, missing-extension error quality, and
  # extension package loading (see scripts/test/npm-install-smoke.sh).
  tests-npm-install-smoke:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    name: tests (npm install smoke)
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-deno
        with:
          warm-cache: "true"
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"
          package-manager-cache: false
      - name: Build npm packages
        run: deno task build:npm
      - name: Clean-room install/import smoke
        run: bash scripts/test/npm-install-smoke.sh

  # ============================================
  # CI: Split Mode Test
  # ============================================

  tests-split-mode:
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && vars.RUN_SPLIT_MODE_TEST == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: tests (split mode)
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-deno

      - name: Compile binary
        run: deno task build

      - name: Test split mode startup
        run: |
          # Start renderer in background
          ./bin/veryfront serve --mode=renderer --port=3000 &
          RENDERER_PID=$!

          # Start proxy in background
          ./bin/veryfront serve --mode=proxy --port=8080 &
          PROXY_PID=$!

          # Wait for startup
          sleep 5

          # Health check - just verify processes are running
          echo "Checking renderer on port 3000..."
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/ --max-time 5 || echo "Renderer not responding (expected without project)"

          echo "Checking proxy on port 8080..."
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ --max-time 5 || echo "Proxy not responding (expected without project)"

          # Verify processes started successfully
          if kill -0 $RENDERER_PID 2>/dev/null; then
            echo "SUCCESS: Renderer process running"
          else
            echo "FAILED: Renderer process not running"
            exit 1
          fi

          if kill -0 $PROXY_PID 2>/dev/null; then
            echo "SUCCESS: Proxy process running"
          else
            echo "FAILED: Proxy process not running"
            exit 1
          fi

          # Cleanup
          kill $RENDERER_PID $PROXY_PID 2>/dev/null || true
          echo "Split mode startup test passed"

  # ============================================
  # CD: Detect release type from deno.json
  # X.Y.Z = stable (npm latest), anything else = RC
  # ============================================

  version-check:
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      is_stable: ${{ steps.check.outputs.is_stable }}
      stable_release_requested: ${{ steps.check.outputs.stable_release_requested }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - name: Detect release type
        id: check
        run: |
          VERSION=$(jq -r '.version' deno.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT

          STABLE_RELEASE_REQUESTED=$(bash scripts/ci/stable-release-requested.sh \
            "${{ github.event_name }}" \
            "$VERSION" \
            "${{ github.event.before }}")
          echo "stable_release_requested=${STABLE_RELEASE_REQUESTED}" >> $GITHUB_OUTPUT

          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> $GITHUB_OUTPUT
            if [[ "$STABLE_RELEASE_REQUESTED" == "true" ]]; then
              echo "::notice::Stable release requested: $VERSION → will publish as latest"
            else
              echo "::notice::Stable version unchanged: $VERSION → skipping publication"
            fi
          else
            echo "is_stable=false" >> $GITHUB_OUTPUT
            echo "::notice::Pre-release version detected: $VERSION → will publish as rc"
          fi

  # ============================================
  # CD: Build Binaries (main only)
  # Version comes directly from deno.json
  # ============================================

  build-binaries:
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && github.ref == 'refs/heads/main' }}
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ contains(matrix.os, 'windows') }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: veryfront-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: veryfront-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: veryfront-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: veryfront-linux-arm64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            name: veryfront-windows-x64.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: ./.github/actions/setup-deno

      - run: deno task build:prepare

      - name: Compile binary
        shell: bash
        run: |
          deno run -A scripts/build/compile-binary.ts \
            --target ${{ matrix.target }} \
            --output ${{ matrix.name }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
          retention-days: 7

  # ============================================
  # CD: Pre-release (RC versions only)
  # Runs when deno.json version has a prerelease suffix (e.g. 0.1.14-rc)
  # Appends .{run_number} and publishes with --tag rc
  # ============================================

  prerelease:
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.version-check.outputs.is_stable == 'false' }}
    needs: [ci, tests, coverage, tests-binary-e2e, tests-npm-install-smoke, build-binaries, version-check]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: ./.github/actions/setup-deno

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Compute RC version
        id: version
        run: |
          BASE=${{ needs.version-check.outputs.version }}
          RC_VERSION="${BASE}.${{ github.run_number }}"
          echo "version=${RC_VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing RC: ${RC_VERSION}"

      - name: Build and publish
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          deno task build:npm
          scripts/ci/publish-npm-packages.sh rc-publish

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: binaries

      - name: Generate SBOM
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: deno task sbom:all --output-dir "dist/sbom-${VERSION}"

      - name: Create release GitHub App token
        id: release-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ vars.VERYFRONT_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.VERYFRONT_RELEASE_APP_PRIVATE_KEY }}
          owner: veryfront
          repositories: |
            veryfront
            veryfront-server
            veryfront-job-runner
            veryfront-sandbox
          permission-contents: write

      - name: Create GitHub pre-release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          # Collect available binaries dynamically (Windows build is optional)
          BINARIES=""
          for f in binaries/veryfront-*/veryfront-*; do
            [ -f "$f" ] && BINARIES="$BINARIES $f"
          done
          SBOMS=""
          for f in dist/sbom-${VERSION}/*.json; do
            [ -f "$f" ] && SBOMS="$SBOMS $f"
          done
          echo "Available binaries: $BINARIES"
          echo "Available SBOMs: $SBOMS"

          # Delete previous rc release if it exists (from earlier merge)
          gh release delete "v${VERSION}" --repo veryfront/veryfront --yes --cleanup-tag 2>/dev/null || true

          # Public repo pre-release
          gh release create "v${VERSION}" \
            --repo veryfront/veryfront \
            --title "v${VERSION}" \
            --prerelease \
            --notes '```bash
          npx veryfront@rc
          ```' \
            $BINARIES \
            scripts/install.sh \
            $SBOMS

      - name: Trigger server deploy
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4.0.1
        with:
          token: ${{ steps.release-app-token.outputs.token }}
          repository: veryfront/veryfront-server
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

      - name: Trigger job-runner deploy
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4.0.1
        with:
          token: ${{ steps.release-app-token.outputs.token }}
          repository: veryfront/veryfront-job-runner
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

      - name: Trigger sandbox deploy
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4.0.1
        with:
          token: ${{ steps.release-app-token.outputs.token }}
          repository: veryfront/veryfront-sandbox
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

  # ============================================
  # CD: Stable Release (clean semver only)
  # Runs when deno.json changes to X.Y.Z (no suffix), or on manual dispatch
  # Publishes with --tag latest, creates git tag, updates Homebrew
  # ============================================

  release:
    if: ${{ (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && needs.version-check.outputs.is_stable == 'true' && needs.version-check.outputs.stable_release_requested == 'true' }}
    needs: [ci, tests, coverage, tests-binary-e2e, tests-npm-install-smoke, build-binaries, version-check]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Read version
        id: version
        run: |
          echo "version=${{ needs.version-check.outputs.version }}" >> $GITHUB_OUTPUT
          echo "Publishing stable: ${{ needs.version-check.outputs.version }}"

      - name: Create release GitHub App token
        id: release-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ vars.VERYFRONT_RELEASE_APP_CLIENT_ID }}
          private-key: ${{ secrets.VERYFRONT_RELEASE_APP_PRIVATE_KEY }}
          owner: veryfront
          repositories: |
            veryfront
            veryfront-server
            veryfront-job-runner
            veryfront-sandbox
          permission-contents: write

      - name: Ensure stable version is unpublished
        env:
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
          SOURCE_REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          scripts/ci/publish-npm-packages.sh preflight
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "::error::Tag ${TAG} already exists on source repo. Bump deno.json before releasing."
            exit 1
          fi
          if gh release view "${TAG}" --repo veryfront/veryfront &>/dev/null; then
            echo "::error::Release ${TAG} already exists on veryfront/veryfront. Bump deno.json before releasing."
            exit 1
          fi
          if GH_TOKEN="${SOURCE_REPO_TOKEN}" gh release view "${TAG}" &>/dev/null; then
            echo "::error::Release ${TAG} already exists on source repo. Bump deno.json before releasing."
            exit 1
          fi

      - uses: ./.github/actions/setup-deno

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Build and publish
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          deno task build:npm
          scripts/ci/publish-npm-packages.sh release-publish

      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8
        with:
          path: binaries

      - name: Generate SBOM
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: deno task sbom:all --output-dir "dist/sbom-${VERSION}"

      - name: Create git tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          git tag "${TAG}"
          git push origin "${TAG}"
          echo "Created tag ${TAG}"

      - name: Create GitHub releases
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ steps.release-app-token.outputs.token }}
        run: |
          # Collect available binaries dynamically (Windows build is optional)
          BINARIES=""
          for f in binaries/veryfront-*/veryfront-*; do
            [ -f "$f" ] && BINARIES="$BINARIES $f"
          done
          SBOMS=""
          for f in dist/sbom-${VERSION}/*.json; do
            [ -f "$f" ] && SBOMS="$SBOMS $f"
          done
          echo "Available binaries: $BINARIES"
          echo "Available SBOMs: $SBOMS"

          # Clean up rc pre-releases (created by the prerelease job on main pushes)
          gh release list --repo veryfront/veryfront --json tagName -q ".[].tagName" \
            | grep "^v${VERSION}-rc\." \
            | xargs -I{} gh release delete {} --repo veryfront/veryfront --yes --cleanup-tag 2>/dev/null || true

          # Public repo release with binaries and install scripts
          gh release create "v${VERSION}" \
            --repo veryfront/veryfront \
            --title "v${VERSION}" \
            --notes '## Install

          ```bash
          # macOS/Linux
          curl -fsSL https://veryfront.com/install.sh | sh

          # npm
          npm install -g veryfront
          ```' \
            $BINARIES \
            scripts/install.sh \
            scripts/install.ps1 \
            $SBOMS

      - name: Create source repo release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --title "v${VERSION}" \
            --generate-notes \
            --notes "Binaries available at: https://github.com/veryfront/veryfront/releases/tag/v${VERSION}"

      - name: Trigger server deploy
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4.0.1
        with:
          token: ${{ steps.release-app-token.outputs.token }}
          repository: veryfront/veryfront-server
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

      - name: Trigger job-runner deploy
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4.0.1
        with:
          token: ${{ steps.release-app-token.outputs.token }}
          repository: veryfront/veryfront-job-runner
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

      - name: Trigger sandbox deploy
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697  # v4.0.1
        with:
          token: ${{ steps.release-app-token.outputs.token }}
          repository: veryfront/veryfront-sandbox
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

  # ============================================
  # CD: Update Homebrew (stable releases only)
  # ============================================

  update-homebrew:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: [release, version-check]
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Create Homebrew tap GitHub App token
        id: homebrew-app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          client-id: ${{ vars.HOMEBREW_TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: veryfront
          repositories: homebrew-tap
          permission-contents: write
          permission-pull-requests: write

      - name: Update Homebrew tap
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4.0.0
        env:
          HOMEBREW_TAP_TOKEN: ${{ steps.homebrew-app-token.outputs.token }}
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            VERSION="${{ needs.version-check.outputs.version }}"

            # Download binaries and calculate checksums
            declare -A SHAS
            for binary in veryfront-macos-arm64 veryfront-macos-x64 veryfront-linux-arm64 veryfront-linux-x64; do
              curl -fsSL "https://github.com/veryfront/veryfront/releases/download/v${VERSION}/${binary}" -o "${binary}"
              SHAS[$binary]=$(sha256sum "${binary}" | cut -d' ' -f1)
            done

            # Generate formula from template
            FORMULA=$(cat homebrew/veryfront.rb)
            FORMULA="${FORMULA//VERSION_PLACEHOLDER/$VERSION}"
            FORMULA="${FORMULA//SHA256_MACOS_ARM64_PLACEHOLDER/${SHAS[veryfront-macos-arm64]}}"
            FORMULA="${FORMULA//SHA256_MACOS_X64_PLACEHOLDER/${SHAS[veryfront-macos-x64]}}"
            FORMULA="${FORMULA//SHA256_LINUX_ARM64_PLACEHOLDER/${SHAS[veryfront-linux-arm64]}}"
            FORMULA="${FORMULA//SHA256_LINUX_X64_PLACEHOLDER/${SHAS[veryfront-linux-x64]}}"

            # Create PR against tap repo (branch protection requires PRs)
            rm -rf tap
            git clone "https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/veryfront/homebrew-tap.git" tap
            mkdir -p tap/Formula
            echo "$FORMULA" > tap/Formula/veryfront.rb
            cd tap
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add Formula/veryfront.rb
            git diff --cached --quiet && echo "No changes to commit" && exit 0

            BRANCH="update-veryfront-v${VERSION}"
            git checkout -b "${BRANCH}"
            git commit -m "Update veryfront to v${VERSION}"
            git push -u origin "${BRANCH}" || git push -u origin "${BRANCH}" --force-with-lease

            PR_NUMBER=$(GH_TOKEN="${HOMEBREW_TAP_TOKEN}" gh api \
              --method GET \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/veryfront/homebrew-tap/pulls?state=open&head=veryfront:${BRANCH}&base=main&per_page=1" \
              --jq '.[0].number // empty')

            if [ -z "${PR_NUMBER}" ]; then
              CREATE_PR_OUTPUT=$(GH_TOKEN="${HOMEBREW_TAP_TOKEN}" gh api \
                --method POST \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/veryfront/homebrew-tap/pulls" \
                -f title="Update veryfront to v${VERSION}" \
                -f base="main" \
                -f head="${BRANCH}" \
                -f body="Automated update from CI - veryfront v${VERSION}" \
                --jq '.number' 2>&1) || {
                  if echo "${CREATE_PR_OUTPUT}" | grep -q "Resource not accessible by personal access token"; then
                    echo "::error::Homebrew tap update requires a GitHub App token with Pull requests: write and Contents: write on veryfront/homebrew-tap."
                  fi
                  echo "${CREATE_PR_OUTPUT}"
                  exit 1
                }
              PR_NUMBER="${CREATE_PR_OUTPUT}"
            fi

            # GitHub can report mergeability as unknown immediately after PR creation or a force-push.
            MERGEABLE=""
            MERGEABLE_STATE=""
            for attempt in {1..24}; do
              PR_JSON=$(GH_TOKEN="${HOMEBREW_TAP_TOKEN}" gh api \
                --method GET \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/veryfront/homebrew-tap/pulls/${PR_NUMBER}")
              MERGEABLE=$(echo "${PR_JSON}" | jq -r '.mergeable')
              MERGEABLE_STATE=$(echo "${PR_JSON}" | jq -r '.mergeable_state')

              if [ "${MERGEABLE}" = "true" ] && [ "${MERGEABLE_STATE}" = "clean" ]; then
                break
              fi

              if [ "${MERGEABLE}" = "false" ]; then
                echo "::error::Homebrew tap PR #${PR_NUMBER} is not mergeable (state=${MERGEABLE_STATE})."
                exit 1
              fi

              sleep 5
            done

            if [ "${MERGEABLE}" != "true" ] || [ "${MERGEABLE_STATE}" != "clean" ]; then
              echo "::error::Timed out waiting for Homebrew tap PR #${PR_NUMBER} to become mergeable (mergeable=${MERGEABLE}, state=${MERGEABLE_STATE})."
              exit 1
            fi

            GH_TOKEN="${HOMEBREW_TAP_TOKEN}" gh api \
              --method PUT \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/veryfront/homebrew-tap/pulls/${PR_NUMBER}/merge" \
              -f merge_method="merge"
