name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # CI: Quality Checks
  # ============================================
  ci:
    runs-on: veryfront-k8s-runners
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno
      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            format) deno fmt --check ;;
            lint) deno task lint ;;
            typecheck) deno task typecheck ;;
          esac

  # ============================================
  # CI: Tests
  # ============================================

  tests:
    runs-on: veryfront-k8s-runners
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno
        with:
          warm-cache: "true"
      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: ${{ matrix.suite == 'integration' && 10 || 5 }}
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            if [ "${{ matrix.suite }}" = "integration" ]; then
              VF_DISABLE_LRU_INTERVAL=1 deno task test:integration --no-lock
            else
              deno task test:unit --no-lock
            fi

  # ============================================
  # CI: Compiled Binary E2E Tests
  # ============================================

  tests-binary-e2e:
    runs-on: veryfront-k8s-runners
    timeout-minutes: 20
    name: tests (binary e2e)
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno
        with:
          warm-cache: "true"
      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            VERYFRONT_BINARY_FRESH=1 deno task test:e2e:binary --no-lock

  # ============================================
  # CI: Split Mode Test
  # ============================================

  tests-split-mode:
    if: vars.RUN_SPLIT_MODE_TEST == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: tests (split mode)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Compile binary
        run: deno task build

      - name: Test split mode startup
        run: |
          # Start renderer in background
          ./bin/veryfront serve --mode=renderer --port=3000 &
          RENDERER_PID=$!

          # Start proxy in background
          ./bin/veryfront serve --mode=proxy --port=8080 &
          PROXY_PID=$!

          # Wait for startup
          sleep 5

          # Health check - just verify processes are running
          echo "Checking renderer on port 3000..."
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/ --max-time 5 || echo "Renderer not responding (expected without project)"

          echo "Checking proxy on port 8080..."
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ --max-time 5 || echo "Proxy not responding (expected without project)"

          # Verify processes started successfully
          if kill -0 $RENDERER_PID 2>/dev/null; then
            echo "SUCCESS: Renderer process running"
          else
            echo "FAILED: Renderer process not running"
            exit 1
          fi

          if kill -0 $PROXY_PID 2>/dev/null; then
            echo "SUCCESS: Proxy process running"
          else
            echo "FAILED: Proxy process not running"
            exit 1
          fi

          # Cleanup
          kill $RENDERER_PID $PROXY_PID 2>/dev/null || true
          echo "Split mode startup test passed"

  # ============================================
  # CD: Detect release type from deno.json
  # X.Y.Z = stable (npm latest), anything else = RC
  # ============================================

  version-check:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.check.outputs.version }}
      is_stable: ${{ steps.check.outputs.is_stable }}
    steps:
      - uses: actions/checkout@v4
      - name: Detect release type
        id: check
        run: |
          VERSION=$(jq -r '.version' deno.json)
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          if [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_stable=true" >> $GITHUB_OUTPUT
            echo "::notice::Stable version detected: $VERSION → will publish as latest"
          else
            echo "is_stable=false" >> $GITHUB_OUTPUT
            echo "::notice::Pre-release version detected: $VERSION → will publish as rc"
          fi

  # ============================================
  # CD: Build Binaries (main only)
  # Version comes directly from deno.json
  # ============================================

  build-binaries:
    if: github.ref == 'refs/heads/main'
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ contains(matrix.os, 'windows') }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: veryfront-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: veryfront-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: veryfront-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: veryfront-linux-arm64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            name: veryfront-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - run: deno task build:prepare

      - name: Compile binary
        shell: bash
        run: |
          # React is fetched at runtime through the module server (SSR transform pipeline)
          # Include Tailwind CSS v4 plugins (versions must match PINNED_PLUGIN_VERSIONS in tailwind-compiler.ts)
          deno compile --allow-all --unstable-net \
            --include src/platform/polyfills \
            --include src/proxy/main.ts \
            --include dist/framework-src \
            --include "https://esm.sh/tailwindcss-animate@1.0.7" \
            --include "https://esm.sh/@tailwindcss/typography@0.5.19" \
            --include "https://esm.sh/@tailwindcss/forms@0.5.11" \
            --include "https://esm.sh/tailwind-scrollbar-hide@2.0.0" \
            --include "https://esm.sh/daisyui@5.5.14" \
            --target ${{ matrix.target }} --output ${{ matrix.name }} cli/main.ts

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
          retention-days: 7

  # ============================================
  # CD: Pre-release (RC versions only)
  # Runs when deno.json version has a prerelease suffix (e.g. 0.1.14-rc)
  # Appends .{run_number} and publishes with --tag rc
  # ============================================

  prerelease:
    if: needs.version-check.outputs.is_stable == 'false'
    needs: [ci, tests, tests-binary-e2e, build-binaries, version-check]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Compute RC version
        id: version
        run: |
          BASE=${{ needs.version-check.outputs.version }}
          RC_VERSION="${BASE}.${{ github.run_number }}"
          echo "version=${RC_VERSION}" >> $GITHUB_OUTPUT
          echo "Publishing RC: ${RC_VERSION}"

      - name: Build and publish
        env:
          VERSION: ${{ steps.version.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if npm view veryfront@"${VERSION}" version 2>/dev/null; then
            echo "::notice::v${VERSION} already published to npm — skipping publish"
          else
            deno task build:npm
            cd npm
            jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
            npm publish --access public --tag rc
          fi

      - uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create GitHub pre-release
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GH_PAT_VERYFRONT }}
        run: |
          # Collect available binaries dynamically (Windows build is optional)
          BINARIES=""
          for f in binaries/veryfront-*/veryfront-*; do
            [ -f "$f" ] && BINARIES="$BINARIES $f"
          done
          echo "Available binaries: $BINARIES"

          # Delete previous rc release if it exists (from earlier merge)
          gh release delete "v${VERSION}" --repo veryfront/veryfront --yes --cleanup-tag 2>/dev/null || true

          # Public repo pre-release
          gh release create "v${VERSION}" \
            --repo veryfront/veryfront \
            --title "v${VERSION}" \
            --prerelease \
            --notes '```bash
          npx veryfront@rc
          ```' \
            $BINARIES \
            scripts/install.sh

      - name: Trigger server deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_VERYFRONT }}
          repository: veryfront/veryfront-server
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

      - name: Trigger job-runner deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_VERYFRONT }}
          repository: veryfront/veryfront-job-runner
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

  # ============================================
  # CD: Stable Release (clean semver only)
  # Runs when deno.json version is X.Y.Z (no suffix)
  # Publishes with --tag latest, creates git tag, updates Homebrew
  # ============================================

  release:
    if: needs.version-check.outputs.is_stable == 'true'
    needs: [ci, tests, tests-binary-e2e, build-binaries, version-check]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          echo "version=${{ needs.version-check.outputs.version }}" >> $GITHUB_OUTPUT
          echo "Publishing stable: ${{ needs.version-check.outputs.version }}"

      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@latest

      - name: Build and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if npm view veryfront@"${VERSION}" version 2>/dev/null; then
            echo "::notice::v${VERSION} already published to npm — skipping publish"
          else
            deno task build:npm
            cd npm && npm publish --access public
          fi

      - uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create git tag
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAG="v${VERSION}"
          if git ls-remote --tags origin | grep -q "refs/tags/${TAG}$"; then
            echo "Tag ${TAG} already exists, skipping"
          else
            git tag "${TAG}"
            git push origin "${TAG}"
            echo "Created tag ${TAG}"
          fi

      - name: Create GitHub releases
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GH_PAT_VERYFRONT }}
        run: |
          # Collect available binaries dynamically (Windows build is optional)
          BINARIES=""
          for f in binaries/veryfront-*/veryfront-*; do
            [ -f "$f" ] && BINARIES="$BINARIES $f"
          done
          echo "Available binaries: $BINARIES"

          # Clean up rc pre-releases (created by the prerelease job on main pushes)
          gh release list --repo veryfront/veryfront --json tagName -q ".[].tagName" \
            | grep "^v${VERSION}-rc\." \
            | xargs -I{} gh release delete {} --repo veryfront/veryfront --yes --cleanup-tag 2>/dev/null || true

          # Public repo release with binaries and install scripts
          if gh release view "v${VERSION}" --repo veryfront/veryfront &>/dev/null; then
            echo "::notice::Release v${VERSION} already exists on veryfront/veryfront — skipping"
          else
            gh release create "v${VERSION}" \
              --repo veryfront/veryfront \
              --title "v${VERSION}" \
              --notes '## Install

          ```bash
          # macOS/Linux
          curl -fsSL https://veryfront.com/install.sh | sh

          # npm
          npm install -g veryfront
          ```' \
              $BINARIES \
              scripts/install.sh \
              scripts/install.ps1
          fi

      - name: Create source repo release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "::notice::Release v${VERSION} already exists on source repo — skipping"
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --generate-notes \
              --notes "Binaries available at: https://github.com/veryfront/veryfront/releases/tag/v${VERSION}"
          fi

      - name: Trigger server deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_VERYFRONT }}
          repository: veryfront/veryfront-server
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

      - name: Trigger job-runner deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_VERYFRONT }}
          repository: veryfront/veryfront-job-runner
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

  # ============================================
  # CD: Update Homebrew (stable releases only)
  # ============================================

  update-homebrew:
    needs: [release, version-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew tap
        uses: nick-fields/retry@v3
        env:
          HOMEBREW_TAP_PAT: ${{ secrets.GH_PAT_HOMEBREW_TAP || secrets.GH_PAT_VERYFRONT }}
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            VERSION="${{ needs.version-check.outputs.version }}"

            # Download binaries and calculate checksums
            declare -A SHAS
            for binary in veryfront-macos-arm64 veryfront-macos-x64 veryfront-linux-arm64 veryfront-linux-x64; do
              curl -fsSL "https://github.com/veryfront/veryfront/releases/download/v${VERSION}/${binary}" -o "${binary}"
              SHAS[$binary]=$(sha256sum "${binary}" | cut -d' ' -f1)
            done

            # Generate formula from template
            FORMULA=$(cat homebrew/veryfront.rb)
            FORMULA="${FORMULA//VERSION_PLACEHOLDER/$VERSION}"
            FORMULA="${FORMULA//SHA256_MACOS_ARM64_PLACEHOLDER/${SHAS[veryfront-macos-arm64]}}"
            FORMULA="${FORMULA//SHA256_MACOS_X64_PLACEHOLDER/${SHAS[veryfront-macos-x64]}}"
            FORMULA="${FORMULA//SHA256_LINUX_ARM64_PLACEHOLDER/${SHAS[veryfront-linux-arm64]}}"
            FORMULA="${FORMULA//SHA256_LINUX_X64_PLACEHOLDER/${SHAS[veryfront-linux-x64]}}"

            # Create PR against tap repo (branch protection requires PRs)
            rm -rf tap
            git clone "https://x-access-token:${HOMEBREW_TAP_PAT}@github.com/veryfront/homebrew-tap.git" tap
            mkdir -p tap/Formula
            echo "$FORMULA" > tap/Formula/veryfront.rb
            cd tap
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add Formula/veryfront.rb
            git diff --cached --quiet && echo "No changes to commit" && exit 0

            BRANCH="update-veryfront-v${VERSION}"
            git checkout -b "${BRANCH}"
            git commit -m "Update veryfront to v${VERSION}"
            git push -u origin "${BRANCH}" || git push -u origin "${BRANCH}" --force-with-lease

            PR_NUMBER=$(GH_TOKEN="${HOMEBREW_TAP_PAT}" gh api \
              --method GET \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/veryfront/homebrew-tap/pulls?state=open&head=veryfront:${BRANCH}&base=main&per_page=1" \
              --jq '.[0].number // empty')

            if [ -z "${PR_NUMBER}" ]; then
              CREATE_PR_OUTPUT=$(GH_TOKEN="${HOMEBREW_TAP_PAT}" gh api \
                --method POST \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                "/repos/veryfront/homebrew-tap/pulls" \
                -f title="Update veryfront to v${VERSION}" \
                -f base="main" \
                -f head="${BRANCH}" \
                -f body="Automated update from CI - veryfront v${VERSION}" \
                --jq '.number' 2>&1) || {
                  if echo "${CREATE_PR_OUTPUT}" | grep -q "Resource not accessible by personal access token"; then
                    echo "::error::Homebrew tap update requires a token with Pull requests: write and Contents: write on veryfront/homebrew-tap (set GH_PAT_HOMEBREW_TAP or fix GH_PAT_VERYFRONT)."
                  fi
                  echo "${CREATE_PR_OUTPUT}"
                  exit 1
                }
              PR_NUMBER="${CREATE_PR_OUTPUT}"
            fi

            GH_TOKEN="${HOMEBREW_TAP_PAT}" gh api \
              --method PUT \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "/repos/veryfront/homebrew-tap/pulls/${PR_NUMBER}/merge" \
              -f merge_method="merge"
