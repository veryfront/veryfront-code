name: CI/CD

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================
  # CI: Quality Checks (PR + main, skip tags)
  # ============================================
  ci:
    if: startsWith(github.ref, 'refs/tags/') == false
    runs-on: veryfront-k8s-runners
    strategy:
      fail-fast: false
      matrix:
        check: [format, lint, typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno
      - name: Run ${{ matrix.check }}
        run: |
          case "${{ matrix.check }}" in
            format) deno fmt --check ;;
            lint) deno task lint ;;
            typecheck) deno task typecheck ;;
          esac

  # ============================================
  # CI: Tests (PR + main, skip tags)
  # ============================================

  tests:
    if: startsWith(github.ref, 'refs/tags/') == false
    runs-on: veryfront-k8s-runners
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        suite: [unit, integration]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno
        with:
          warm-cache: "true"
      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: ${{ matrix.suite == 'integration' && 10 || 5 }}
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            if [ "${{ matrix.suite }}" = "integration" ]; then
              VF_DISABLE_LRU_INTERVAL=1 deno task test:integration --no-lock
            else
              deno task test:unit --no-lock
            fi

  # ============================================
  # CI: Compiled Binary E2E Tests (PR + main, skip tags)
  # ============================================

  tests-binary-e2e:
    if: startsWith(github.ref, 'refs/tags/') == false
    runs-on: veryfront-k8s-runners
    timeout-minutes: 20
    name: tests (binary e2e)
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-deno
        with:
          warm-cache: "true"
      - uses: nick-fields/retry@v3
        with:
          timeout_minutes: 15
          max_attempts: 2
          retry_wait_seconds: 30
          command: |
            VERYFRONT_BINARY_FRESH=1 deno task test:e2e:binary --no-lock

  # ============================================
  # CI: Split Mode Test (PR + main, skip tags)
  # ============================================

  tests-split-mode:
    if: startsWith(github.ref, 'refs/tags/') == false && vars.RUN_SPLIT_MODE_TEST == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    name: tests (split mode)
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - name: Compile binary
        run: deno task build

      - name: Test split mode startup
        run: |
          # Start renderer in background
          ./bin/veryfront serve --mode=renderer --port=3000 &
          RENDERER_PID=$!

          # Start proxy in background
          ./bin/veryfront serve --mode=proxy --port=8080 &
          PROXY_PID=$!

          # Wait for startup
          sleep 5

          # Health check - just verify processes are running
          echo "Checking renderer on port 3000..."
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/ --max-time 5 || echo "Renderer not responding (expected without project)"

          echo "Checking proxy on port 8080..."
          curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/ --max-time 5 || echo "Proxy not responding (expected without project)"

          # Verify processes started successfully
          if kill -0 $RENDERER_PID 2>/dev/null; then
            echo "SUCCESS: Renderer process running"
          else
            echo "FAILED: Renderer process not running"
            exit 1
          fi

          if kill -0 $PROXY_PID 2>/dev/null; then
            echo "SUCCESS: Proxy process running"
          else
            echo "FAILED: Proxy process not running"
            exit 1
          fi

          # Cleanup
          kill $RENDERER_PID $PROXY_PID 2>/dev/null || true
          echo "Split mode startup test passed"

  # ============================================
  # CD: Build Binaries (main + tags)
  # Version comes directly from deno.json
  # ============================================

  build-binaries:
    if: (github.ref == 'refs/heads/main' && github.event_name == 'push') || startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ contains(matrix.os, 'windows') }}
    strategy:
      matrix:
        include:
          - os: macos-latest
            target: aarch64-apple-darwin
            name: veryfront-macos-arm64
          - os: macos-latest
            target: x86_64-apple-darwin
            name: veryfront-macos-x64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: veryfront-linux-x64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            name: veryfront-linux-arm64
          - os: windows-2022
            target: x86_64-pc-windows-msvc
            name: veryfront-windows-x64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - run: deno run -A scripts/build/generate-templates-manifest.ts
      - run: deno run -A scripts/build/prepare-framework-sources.ts

      - name: Compile binary
        shell: bash
        run: |
          # React is fetched at runtime through the module server (SSR transform pipeline)
          # Include Tailwind CSS v4 plugins (versions must match PINNED_PLUGIN_VERSIONS in tailwind-compiler.ts)
          deno compile --allow-all --unstable-net \
            --include src/platform/polyfills \
            --include src/proxy/main.ts \
            --include dist/framework-src \
            --include "https://esm.sh/tailwindcss-animate@1.0.7" \
            --include "https://esm.sh/@tailwindcss/typography@0.5.19" \
            --include "https://esm.sh/@tailwindcss/forms@0.5.11" \
            --include "https://esm.sh/tailwind-scrollbar-hide@2.0.0" \
            --include "https://esm.sh/daisyui@5.5.14" \
            --target ${{ matrix.target }} --output ${{ matrix.name }} cli/main.ts

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}
          retention-days: 7

  # ============================================
  # CD: Pre-release (main only)
  # Publishes whatever version is in deno.json with --tag rc
  # ============================================

  prerelease:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [ci, tests, tests-binary-e2e, build-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - name: Read version
        id: version
        run: echo "version=$(jq -r '.version' deno.json)" >> $GITHUB_OUTPUT

      - name: Build and publish
        env:
          VERSION: ${{ steps.version.outputs.version }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          deno task build:npm
          cd npm && npm publish --access public --tag rc

      - uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create GitHub releases
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GH_PAT_VERYFRONT }}
        run: |
          # Public repo release
          gh release create "v${VERSION}" \
            --repo veryfront/veryfront \
            --title "v${VERSION}" \
            --notes '```bash
          npx veryfront@'"${VERSION}"'
          ```' \
            binaries/veryfront-macos-arm64/veryfront-macos-arm64 \
            binaries/veryfront-macos-x64/veryfront-macos-x64 \
            binaries/veryfront-linux-x64/veryfront-linux-x64 \
            binaries/veryfront-linux-arm64/veryfront-linux-arm64 \
            binaries/veryfront-windows-x64.exe/veryfront-windows-x64.exe \
            scripts/install.sh

      - name: Create source repo release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes 'Binaries available at: https://github.com/veryfront/veryfront/releases/tag/v${{ steps.version.outputs.version }}'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger server deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_VERYFRONT }}
          repository: veryfront/veryfront-server
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

  # ============================================
  # CD: Stable Release (tags only)
  # ============================================

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-binaries]
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Validate tag matches deno.json
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          DENO_VERSION=$(jq -r '.version' deno.json)
          if [ "$TAG_VERSION" != "$DENO_VERSION" ]; then
            echo "Error: Tag ($TAG_VERSION) doesn't match deno.json ($DENO_VERSION)"
            exit 1
          fi

      - name: Read version
        id: version
        run: echo "version=$(jq -r '.version' deno.json)" >> $GITHUB_OUTPUT

      - uses: denoland/setup-deno@v2
        with:
          deno-version: lts

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      - run: npm install -g npm@latest

      - name: Build and publish
        run: |
          deno task build:npm
          VERSION=$(jq -r '.version' deno.json)
          if [[ "$VERSION" == *"-rc"* ]] || [[ "$VERSION" == *"-alpha"* ]] || [[ "$VERSION" == *"-beta"* ]]; then
            cd npm && npm publish --access public --tag rc
          else
            cd npm && npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - uses: actions/download-artifact@v4
        with:
          path: binaries

      - name: Create GitHub releases
        env:
          VERSION: ${{ steps.version.outputs.version }}
          GH_TOKEN: ${{ secrets.GH_PAT_VERYFRONT }}
        run: |
          # Public repo release with binaries and install scripts
          gh release create "v${VERSION}" \
            --repo veryfront/veryfront \
            --title "v${VERSION}" \
            --notes '## Install

          ```bash
          # macOS/Linux
          curl -fsSL https://veryfront.com/install.sh | sh

          # npm
          npm install -g veryfront
          ```' \
            binaries/veryfront-macos-arm64/veryfront-macos-arm64 \
            binaries/veryfront-macos-x64/veryfront-macos-x64 \
            binaries/veryfront-linux-x64/veryfront-linux-x64 \
            binaries/veryfront-linux-arm64/veryfront-linux-arm64 \
            binaries/veryfront-windows-x64.exe/veryfront-windows-x64.exe \
            scripts/install.sh \
            scripts/install.ps1

      - name: Create source repo release
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes \
            --notes 'Binaries available at: https://github.com/veryfront/veryfront/releases/tag/v${{ steps.version.outputs.version }}'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger server deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.GH_PAT_VERYFRONT }}
          repository: veryfront/veryfront-server
          event-type: veryfront-code-released
          client-payload: '{"version": "${{ steps.version.outputs.version }}"}'

  # ============================================
  # CD: Update Homebrew (tags only)
  # ============================================

  update-homebrew:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew tap
        uses: nick-fields/retry@v3
        env:
          GITHUB_PAT: ${{ secrets.GH_PAT_VERYFRONT }}
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 10
          command: |
            VERSION="${GITHUB_REF#refs/tags/v}"

            # Download binaries and calculate checksums
            declare -A SHAS
            for binary in veryfront-macos-arm64 veryfront-macos-x64 veryfront-linux-arm64 veryfront-linux-x64; do
              curl -fsSL "https://github.com/veryfront/veryfront/releases/download/v${VERSION}/${binary}" -o "${binary}"
              SHAS[$binary]=$(sha256sum "${binary}" | cut -d' ' -f1)
            done

            # Generate formula from template
            FORMULA=$(cat homebrew/veryfront.rb)
            FORMULA="${FORMULA//VERSION_PLACEHOLDER/$VERSION}"
            FORMULA="${FORMULA//SHA256_MACOS_ARM64_PLACEHOLDER/${SHAS[veryfront-macos-arm64]}}"
            FORMULA="${FORMULA//SHA256_MACOS_X64_PLACEHOLDER/${SHAS[veryfront-macos-x64]}}"
            FORMULA="${FORMULA//SHA256_LINUX_ARM64_PLACEHOLDER/${SHAS[veryfront-linux-arm64]}}"
            FORMULA="${FORMULA//SHA256_LINUX_X64_PLACEHOLDER/${SHAS[veryfront-linux-x64]}}"

            # Push to tap repo (fresh clone each retry to avoid conflicts)
            rm -rf tap
            git clone "https://x-access-token:${GITHUB_PAT}@github.com/veryfront/homebrew-tap.git" tap
            mkdir -p tap/Formula
            echo "$FORMULA" > tap/Formula/veryfront.rb
            cd tap
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add Formula/veryfront.rb
            git diff --cached --quiet && echo "No changes to commit" && exit 0
            git commit -m "Update veryfront to v${VERSION}"
            git push
