name: Claude Code

on:
  # Interactive: @claude mentions
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review_comment:
    types: [created]

  # Automated: CI failures
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
  pull_request:
    types: [opened, synchronize, ready_for_review, labeled]

  # Scheduled maintenance
  schedule:
    - cron: "0 9 * * 1" # Monday 9am UTC
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        type: choice
        options:
          - maintenance
          - dependency-audit

concurrency:
  # Group by branch name for PR events, issue number for issues, run_id for others
  # This ensures PR review and auto-fix on same branch don't overlap
  group: claude-${{ github.event.pull_request.head.ref || github.event.issue.number || github.run_id }}
  cancel-in-progress: false  # Don't cancel - let running jobs complete (especially auto-fix)

jobs:
  # ===========================================
  # Interactive: @claude mentions
  # ===========================================
  claude-mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned' && github.event.assignee.login == 'claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}

  # ===========================================
  # CI Auto-Fix: Fix lint/typecheck/test failures
  # ===========================================
  ci-auto-fix:
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          prompt: |
            CI failed on branch: ${{ github.event.workflow_run.head_branch }}

            1. Run: gh run view ${{ github.event.workflow_run.id }} --log-failed
            2. Identify and fix lint, typecheck, or test failures
            3. Commit with message: "fix: auto-fix CI failures"
            4. Push the fix

            Only fix obvious issues. Comment if manual attention needed.
          claude_args: "--allowedTools 'Read,Write,Edit,Bash(deno task lint),Bash(deno task typecheck),Bash(deno task test:unit),Bash(git:*),Bash(gh:*)'"

  # ===========================================
  # Issue Triage: Auto-label new issues
  # ===========================================
  issue-triage:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          prompt: |
            Triage issue #${{ github.event.issue.number }}
            Title: ${{ github.event.issue.title }}

            1. Classify: bug, feature, question, or documentation
            2. Priority: critical, high, medium, low
            3. Area: renderer, proxy, cli, ai, routing, rsc
            4. Apply labels with: gh issue edit ${{ github.event.issue.number }} --add-label "<labels>"
            5. If bug without reproduction steps, ask for them
          claude_args: "--allowedTools 'Bash(gh:*)'"

  # ===========================================
  # Ralph Loop: Self-healing PR review
  # ===========================================
  ralph-loop:
    if: |
      github.event_name == 'pull_request' &&
      github.event.action != 'labeled' &&
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review') &&
      !contains(github.event.pull_request.labels.*.name, 'auto-fix-in-progress')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          claude_args: "--allowedTools 'Bash,Read,Write,Edit,Glob,Grep,Bash(git:*),Bash(gh:*),Bash(deno task lint),Bash(deno task typecheck)'"
          prompt: |
            Review PR #${{ github.event.pull_request.number }} in a self-healing loop.

            ## Loop Logic

            attempts = 0
            while attempts < 3:
                1. Review the current code for BLOCKING issues:
                   - Security vulnerabilities (OAuth bypass, proxy exploits, injection)
                   - Bugs that will cause runtime errors or server crashes
                   - Memory leaks in streaming responses
                   - RSC hydration mismatches that break the app
                   - Critical Deno/TypeScript errors

                2. If blocking issues found:
                   - Fix them
                   - Run deno task lint && deno task typecheck to verify
                   - git add -A && git commit -m "fix: address review feedback"
                   - git push
                   - attempts += 1
                   - Loop back to step 1 (re-review your own fixes)

                3. If no blocking issues:
                   - gh pr review ${{ github.event.pull_request.number }} --approve --body "LGTM - no blocking issues"
                   - Exit successfully

            # If we get here, we've exhausted attempts
            gh pr review ${{ github.event.pull_request.number }} --request-changes --body "Could not auto-fix all blocking issues after 3 attempts. Manual intervention required."
            Exit with failure

            ## Important

            - Only fix BLOCKING issues, ignore style preferences
            - Re-review after each fix to catch regressions
            - Be persistent but know when to stop
            - If you can't fix something, explain why in the review

  # ===========================================
  # Weekly Maintenance
  # ===========================================
  maintenance:
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'maintenance')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          prompt: |
            Weekly maintenance for veryfront-renderer:

            1. Check for outdated Deno dependencies in deno.json
            2. Find TODO/FIXME comments from last week
            3. List issues with no activity for 30+ days
            4. Create a summary issue with findings
          claude_args: "--allowedTools 'Read,Bash(deno info),Bash(git:*),Bash(gh:*)'"
