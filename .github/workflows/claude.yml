name: Claude Code

on:
  # Interactive: @claude mentions
  issue_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review_comment:
    types: [created]

  # Automated: CI failures
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
  pull_request:
    types: [opened, synchronize, ready_for_review]
  pull_request_review:
    types: [submitted]

  # Scheduled maintenance
  schedule:
    - cron: "0 9 * * 1" # Monday 9am UTC
  workflow_dispatch:
    inputs:
      task:
        description: "Task to run"
        required: true
        type: choice
        options:
          - maintenance
          - dependency-audit

concurrency:
  # Group by branch name for PR events, issue number for issues, run_id for others
  # This ensures PR review and auto-fix on same branch don't overlap
  group: claude-${{ github.event.pull_request.head.ref || github.event.issue.number || github.run_id }}
  cancel-in-progress: false  # Don't cancel - let running jobs complete (especially auto-fix)

jobs:
  # ===========================================
  # Interactive: @claude mentions
  # ===========================================
  claude-mention:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'issues' && github.event.action == 'assigned' && github.event.assignee.login == 'claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}

  # ===========================================
  # CI Auto-Fix: Fix lint/typecheck/test failures
  # ===========================================
  ci-auto-fix:
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.head_branch != 'main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      actions: read
      id-token: write
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          prompt: |
            CI failed on branch: ${{ github.event.workflow_run.head_branch }}

            1. Run: gh run view ${{ github.event.workflow_run.id }} --log-failed
            2. Identify and fix lint, typecheck, or test failures
            3. Commit with message: "fix: auto-fix CI failures"
            4. Push the fix

            Only fix obvious issues. Comment if manual attention needed.
          allowed_tools: |
            Read,Write,Edit,Bash(deno task lint),Bash(deno task typecheck),Bash(deno task test:unit),Bash(git:*),Bash(gh run view:*)

  # ===========================================
  # Issue Triage: Auto-label new issues
  # ===========================================
  issue-triage:
    if: github.event_name == 'issues' && github.event.action == 'opened'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          prompt: |
            Triage issue #${{ github.event.issue.number }}
            Title: ${{ github.event.issue.title }}

            1. Classify: bug, feature, question, or documentation
            2. Priority: critical, high, medium, low
            3. Area: renderer, proxy, cli, ai, routing, rsc
            4. Apply labels with: gh issue edit ${{ github.event.issue.number }} --add-label "<labels>"
            5. If bug without reproduction steps, ask for them
          allowed_tools: |
            Bash(gh issue edit:*),Bash(gh issue comment:*),Bash(gh search issues:*)

  # ===========================================
  # PR Review: Automated code review
  # ===========================================
  pr-review:
    if: |
      github.event_name == 'pull_request' &&
      github.event.pull_request.draft == false &&
      !contains(github.event.pull_request.labels.*.name, 'skip-review') &&
      !contains(github.event.pull_request.labels.*.name, 'auto-fix-in-progress')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            Review PR #${{ github.event.pull_request.number }}

            Focus on BLOCKING issues only:
            - Security vulnerabilities (OAuth bypass, proxy exploits, injection)
            - Bugs that will cause runtime errors or server crashes
            - Memory leaks in streaming responses
            - RSC hydration mismatches that break the app
            - Critical Deno/TypeScript errors

            NON-BLOCKING (comment only, don't request changes):
            - Style preferences, minor refactoring suggestions
            - Performance optimizations that aren't critical
            - SSR patterns that are just preferences
            - Missing tests (unless for critical paths)

            After reviewing:
            1. Post inline comments for specific issues
            2. If BLOCKING issues found:
               - Run: gh pr review ${{ github.event.pull_request.number }} --request-changes --body "Found blocking issues that must be addressed. See inline comments."
               - Then exit with: exit 1
            3. If NO blocking issues (minor suggestions OK):
               - Run: gh pr review ${{ github.event.pull_request.number }} --approve --body "LGTM - no blocking issues found."
          allowed_tools: |
            mcp__github_file_ops__create_or_update_file,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr review:*),Bash(exit:*)

  # ===========================================
  # Review Auto-Fix: Fix issues from PR review
  # ===========================================
  review-auto-fix:
    if: |
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested' &&
      contains(github.event.review.body, 'blocking issues') &&
      !contains(github.event.pull_request.labels.*.name, 'skip-auto-fix') &&
      !contains(github.event.pull_request.labels.*.name, 'auto-fix-failed')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write
    steps:
      - name: Check if review is still current
        id: check-current
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Get the commit SHA the review was made on
          REVIEW_SHA="${{ github.event.review.commit_id }}"

          # Get current HEAD of the PR branch
          CURRENT_SHA=$(gh pr view ${{ github.event.pull_request.number }} --repo ${{ github.repository }} --json headRefOid --jq '.headRefOid')

          if [ "$REVIEW_SHA" != "$CURRENT_SHA" ]; then
            echo "Review was on $REVIEW_SHA but branch is now at $CURRENT_SHA. Skipping auto-fix (new commits arrived)."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Review is current. Proceeding with auto-fix."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Check auto-fix attempt count
        if: steps.check-current.outputs.skip != 'true'
        id: check-attempts
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_NUMBER=${{ github.event.pull_request.number }}
          LABELS=$(gh pr view $PR_NUMBER --repo ${{ github.repository }} --json labels --jq '.labels[].name')

          # Count existing auto-fix-attempt labels
          ATTEMPT_COUNT=$(echo "$LABELS" | grep -c "auto-fix-attempt" || echo "0")

          if [ "$ATTEMPT_COUNT" -ge 3 ]; then
            echo "Max auto-fix attempts (3) reached. Adding auto-fix-failed label."
            gh pr edit $PR_NUMBER --repo ${{ github.repository }} --add-label "auto-fix-failed"
            gh pr comment $PR_NUMBER --repo ${{ github.repository }} --body "🛑 Auto-fix has failed after 3 attempts. Manual intervention required."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            NEXT_ATTEMPT=$((ATTEMPT_COUNT + 1))
            gh pr edit $PR_NUMBER --repo ${{ github.repository }} --add-label "auto-fix-attempt-$NEXT_ATTEMPT,auto-fix-in-progress"
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "attempt=$NEXT_ATTEMPT" >> $GITHUB_OUTPUT
          fi

      - name: Load secrets from 1Password
        if: steps.check-current.outputs.skip != 'true' && steps.check-attempts.outputs.skip != 'true'
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key

      - uses: actions/checkout@v4
        if: steps.check-current.outputs.skip != 'true' && steps.check-attempts.outputs.skip != 'true'
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: denoland/setup-deno@v2
        if: steps.check-current.outputs.skip != 'true' && steps.check-attempts.outputs.skip != 'true'
        with:
          deno-version: v2.x

      - uses: anthropics/claude-code-action@v1
        if: steps.check-current.outputs.skip != 'true' && steps.check-attempts.outputs.skip != 'true'
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          prompt: |
            PR #${{ github.event.pull_request.number }} review requested changes (attempt ${{ steps.check-attempts.outputs.attempt }}/3).

            IMPORTANT: Before making any changes, pull latest to avoid conflicts:
            git pull --rebase origin ${{ github.event.pull_request.head.ref }}

            1. Read the review comments: gh pr view ${{ github.event.pull_request.number }} --comments
            2. Read the specific inline review comments: gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments --jq '.[] | "\(.path):\(.line) - \(.body)"'
            3. Fix ALL blocking issues mentioned in the review
            4. Run lint and typecheck to ensure fixes don't break anything:
               - deno task lint
               - deno task typecheck
            5. Commit with message: "fix: address PR review feedback (auto-fix attempt ${{ steps.check-attempts.outputs.attempt }})"
            6. Push the changes. If push fails due to new commits:
               - Run: git pull --rebase origin ${{ github.event.pull_request.head.ref }}
               - Then push again
               - If still failing, comment on PR and skip

            After pushing, remove the auto-fix-in-progress label:
            gh pr edit ${{ github.event.pull_request.number }} --remove-label "auto-fix-in-progress"

            If you cannot fix an issue or push fails repeatedly, comment on the PR explaining why manual intervention is needed.
          allowed_tools: |
            Read,Write,Edit,Bash(deno task lint),Bash(deno task typecheck),Bash(deno task test:unit),Bash(git:*),Bash(gh pr:*),Bash(gh api:*)

  # ===========================================
  # Weekly Maintenance
  # ===========================================
  maintenance:
    if: |
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'maintenance')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      id-token: write
    steps:
      - name: Load secrets from 1Password
        uses: 1password/load-secrets-action@v2
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_ACCOUNT_TOKEN }}
          ANTHROPIC_API_KEY: op://VERYFRONT_CI/ANTHROPIC_PRODUCTION/api_key
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x
      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ env.ANTHROPIC_API_KEY }}
          prompt: |
            Weekly maintenance for veryfront-renderer:

            1. Check for outdated Deno dependencies in deno.json
            2. Find TODO/FIXME comments from last week
            3. List issues with no activity for 30+ days
            4. Create a summary issue with findings
          allowed_tools: |
            Read,Bash(deno info),Bash(git log:*),Bash(gh issue:*)
