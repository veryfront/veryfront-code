# Docker Compose for reproducing production environment locally
# This connects to the real production API but runs proxy + renderer locally
#
# Prerequisites:
#   cp .env.local.example .env.local
#   # Fill in OAuth credentials from 1Password
#
# Usage:
#   docker-compose up --build
#
# Access:
#   curl -H "Host: codersociety.veryfront.com" http://localhost:20000/

services:
  proxy:
    build:
      context: .
      dockerfile: Dockerfile.proxy
    ports:
      - "20000:20000"
    env_file:
      - .env.local
    environment:
      # Override for Docker networking
      PORT: 20000
      RENDERER_URL: http://renderer:20001
    depends_on:
      - renderer

  renderer:
    build:
      context: .
      dockerfile: Dockerfile.renderer
    ports:
      - "20001:20001"
    env_file:
      - .env.local
    environment:
      # Override for Docker networking
      PORT: 20001
      PROXY_MODE: 1
