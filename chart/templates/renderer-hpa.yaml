{{- if and .Values.renderer.enabled .Values.renderer.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "veryfront-renderer.renderer.fullname" . }}
  labels:
    {{- include "veryfront-renderer.labels" . | nindent 4 }}
    {{- include "veryfront-renderer.renderer.selectorLabels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "veryfront-renderer.renderer.fullname" . }}
  minReplicas: {{ .Values.renderer.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.renderer.autoscaling.maxReplicas }}
  metrics:
    {{- if .Values.renderer.autoscaling.targetMemoryUtilizationPercentage }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.renderer.autoscaling.targetMemoryUtilizationPercentage }}
    {{- end }}
    {{- if .Values.renderer.autoscaling.targetCPUUtilizationPercentage }}
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.renderer.autoscaling.targetCPUUtilizationPercentage }}
    {{- end }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.renderer.autoscaling.scaleDownStabilizationWindowSeconds | default 300 }}
      policies:
        - type: Percent
          value: 25
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: {{ .Values.renderer.autoscaling.scaleUpStabilizationWindowSeconds | default 0 }}
      policies:
        - type: Percent
          value: 100
          periodSeconds: 15
        - type: Pods
          value: 2
          periodSeconds: 15
      selectPolicy: Max
{{- end }}
