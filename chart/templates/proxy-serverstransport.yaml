{{- if .Values.proxy.enabled }}
{{- if .Values.proxy.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: ServersTransport
metadata:
  name: {{ include "veryfront-renderer.proxy.fullname" . }}-transport
  labels:
    {{- include "veryfront-renderer.labels" . | nindent 4 }}
spec:
  # Forward timeout: wait for the first response byte
  # SSR can take time on cold starts (module compilation, cache warming)
  forwardingTimeouts:
    # Time to wait for a response from the backend (default 30s → 120s)
    responseHeaderTimeout: {{ .Values.proxy.ingress.responseTimeout | default "120s" }}
    # Time to wait for the backend connection to be established
    dialTimeout: {{ .Values.proxy.ingress.dialTimeout | default "30s" }}
{{- end }}
{{- end }}
