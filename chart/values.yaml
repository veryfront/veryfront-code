# Default values for veryfront-renderer
# This chart deploys two components: proxy and renderer

# Shared configuration
imagePullSecrets:
  - name: ghcr-registry

# veryfront-proxy (formerly app-server)
# Handles incoming requests and proxies to renderer or serves cached content
proxy:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/veryfront/veryfront-proxy
    pullPolicy: IfNotPresent
    tag: ""

  service:
    type: ClusterIP
    port: 80
    targetPort: 20000

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
      ephemeral-storage: "50Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
      ephemeral-storage: "100Mi"

  env:
    PORT: "20000"
    RENDERER_URL: "http://veryfront-renderer:80"
    # API URL for OAuth token exchange
    # Use internal K8s service for performance (no public internet roundtrip)
    VERYFRONT_API_BASE_URL: "http://veryfront-api:80"
    # Token cache configuration (Redis for distributed caching)
    # REDIS_URL is provided via veryfront-proxy-secret
    CACHE_TYPE: "redis"
    REDIS_PREFIX: "vf:token:"
    # Structured JSON logging for Grafana
    LOG_FORMAT: "json"
    # OpenTelemetry tracing
    OTEL_TRACES_ENABLED: "true"
    OTEL_TRACES_EXPORTER: "otlp"
    OTEL_SERVICE_NAME: "veryfront-proxy"
    OTEL_EXPORTER_OTLP_ENDPOINT: "https://otlp-gateway-prod-eu-west-2.grafana.net/otlp"

  # Secret must contain:
  # - API_CLIENT_ID_VERYFRONT_RENDERER_PROXY (from 1Password: VERYFRONT_CI / "Veryfront Renderer Proxy OAuth")
  # - API_CLIENT_SECRET_VERYFRONT_RENDERER_PROXY
  # - REDIS_URL
  # - OTEL_EXPORTER_OTLP_HEADERS
  envFrom:
    - secretRef:
        name: veryfront-proxy-secret

  readinessProbe:
    httpGet:
      path: /_proxy/health
      port: 20000
    periodSeconds: 10
    timeoutSeconds: 5

  startupProbe:
    httpGet:
      path: /_proxy/health
      port: 20000
    failureThreshold: 30
    periodSeconds: 10

  podAntiAffinity:
    enabled: true
    topologyKey: kubernetes.io/hostname

  # Middleware configuration (Traefik Middleware)
  middleware:
    compress:
      enabled: false
    httpsRedirect:
      enabled: false
    cors:
      enabled: false
      allowMethods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "PATCH"
        - "OPTIONS"
      allowOriginRegex:
        - ".*"
      allowHeaders:
        - "Authorization"
        - "Content-Type"
        - "Accept"
        - "Origin"
        - "X-Requested-With"
      allowCredentials: true
      maxAge: 86400

  # Ingress configuration (Traefik IngressRoute)
  ingress:
    enabled: true
    entryPoints:
      - websecure
    # Enable sticky sessions (cookie-based session affinity)
    sticky: true
    # Routes define the matching rules and middlewares
    # Use HostRegexp for wildcard matching, Host for exact matching
    # Priority is set lower than veryfront-api (10000+) and veryfront-studio (10000+)
    # so specific hosts take precedence over wildcard routes
    routes:
      # Catch-all for *.veryfront.com (excludes exact veryfront.com, api.*, auth.*, etc. via priority)
      - match: HostRegexp(`^.+\.veryfront\.com$`)
        priority: 9000
        middlewares:
          - name: compress
          - name: cors-public-api
      # Catch-all for *.preview.veryfront.com
      - match: HostRegexp(`^.+\.preview\.veryfront\.com$`)
        priority: 9000
        middlewares:
          - name: compress
          - name: cors-public-api
    tls:
      enabled: true
      secretName: veryfront-com-wildcard-cert

# veryfront-renderer (formerly renderer-server)
# Handles SSR rendering requests
renderer:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/veryfront/veryfront-renderer
    pullPolicy: IfNotPresent
    tag: ""

  # Renderer-specific: no MODE needed, it's the default entrypoint

  service:
    type: ClusterIP
    port: 80
    targetPort: 20000

  resources:
    requests:
      cpu: "500m"
      memory: "1Gi"
      ephemeral-storage: "1Gi"
    limits:
      cpu: "3000m"
      memory: "4Gi"
      ephemeral-storage: "2Gi"

  env:
    PORT: "20000"
    # Bind to all interfaces (0.0.0.0) for port-forward compatibility
    # Note: K8s sets HOSTNAME to pod name, which would bind to pod IP only
    HOST: "0.0.0.0"
    PROXY_MODE: "1"
    # API URL for domain lookups and other internal API calls
    # Use internal K8s service for performance (no public internet roundtrip)
    VERYFRONT_API_BASE_URL: "http://veryfront-api:80"
    # V8 heap size: 3.5GB with container limit 4Gi
    # Large projects (e.g., codersociety) can require 3GB+ memory
    DENO_V8_FLAGS: "--max-old-space-size=3584"
    # Limit concurrent ESM transforms to prevent memory spikes
    # Reduced to 1 to minimize peak memory during SSR
    SSR_MAX_CONCURRENT_TRANSFORMS: "1"
    # Enable memory monitoring (logs heap usage periodically)
    ENABLE_MEMORY_MONITORING: "true"
    MEMORY_MONITORING_INTERVAL_MS: "30000"
    # Structured JSON logging for Grafana
    LOG_FORMAT: "json"
    # OpenTelemetry tracing
    OTEL_TRACES_ENABLED: "true"
    OTEL_TRACES_EXPORTER: "otlp"
    OTEL_SERVICE_NAME: "veryfront-renderer"
    OTEL_EXPORTER_OTLP_ENDPOINT: "https://otlp-gateway-prod-eu-west-2.grafana.net/otlp"
    # OpenTelemetry metrics (V8 heap, memory, cache sizes, request counts)
    OTEL_METRICS_ENABLED: "true"
    OTEL_METRICS_EXPORTER: "otlp"
    # Uses same endpoint as traces (Grafana OTLP gateway accepts both)

  # Secret must contain: OTEL_EXPORTER_OTLP_HEADERS
  envFrom:
    - secretRef:
        name: veryfront-renderer-secret

  # Pod annotations for monitoring
  podAnnotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "20000"
    prometheus.io/path: "/_metrics"

  readinessProbe:
    httpGet:
      path: /readyz
      port: 20000
    periodSeconds: 10
    timeoutSeconds: 5

  livenessProbe:
    httpGet:
      path: /healthz
      port: 20000
    periodSeconds: 30
    timeoutSeconds: 5
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /healthz
      port: 20000
    initialDelaySeconds: 15
    failureThreshold: 60
    periodSeconds: 5
    timeoutSeconds: 3

  podAntiAffinity:
    enabled: true
    topologyKey: kubernetes.io/hostname

  # Horizontal Pod Autoscaler - scales based on memory/CPU usage
  # Memory-based scaling is critical for the renderer to avoid OOM crashes
  #
  # V8 heap (3.5GB) + Deno overhead (~500MB) = 4GB container limit
  # Scale at 75% (~3GB) to give HPA reaction time before V8 limit
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 6
    # Scale at 75% (~3GB) - before V8 heap limit (3.5GB)
    targetMemoryUtilizationPercentage: 75
    # Also scale on CPU for request-heavy loads
    targetCPUUtilizationPercentage: 80
    # Wait 5 minutes before scaling down to avoid flapping
    scaleDownStabilizationWindowSeconds: 300
    # Scale up immediately when needed
    scaleUpStabilizationWindowSeconds: 0
