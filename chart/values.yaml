# Default values for veryfront-renderer
# This chart deploys two components: proxy and renderer

# Shared configuration
imagePullSecrets:
  - name: ghcr-registry

# veryfront-proxy (formerly app-server)
# Handles incoming requests and proxies to renderer or serves cached content
proxy:
  enabled: true
  replicaCount: 2

  image:
    repository: ghcr.io/veryfront/veryfront-proxy
    pullPolicy: IfNotPresent
    tag: ""

  service:
    type: ClusterIP
    port: 80
    targetPort: 20000

  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
      ephemeral-storage: "50Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
      ephemeral-storage: "100Mi"

  env:
    PORT: "20000"
    RENDERER_URL: "http://veryfront-renderer:80"
    # OpenTelemetry tracing
    OTEL_TRACES_ENABLED: "true"
    OTEL_TRACES_EXPORTER: "otlp"
    OTEL_SERVICE_NAME: "veryfront-proxy"
    OTEL_EXPORTER_OTLP_ENDPOINT: "https://otlp-gateway-prod-eu-west-2.grafana.net/otlp"

  envFrom:
    - secretRef:
        name: veryfront-proxy-secret

  readinessProbe:
    httpGet:
      path: /_proxy/health
      port: 20000
    periodSeconds: 10
    timeoutSeconds: 5

  startupProbe:
    httpGet:
      path: /_proxy/health
      port: 20000
    failureThreshold: 30
    periodSeconds: 10

  podAntiAffinity:
    enabled: true
    topologyKey: kubernetes.io/hostname

  # Middleware configuration (Traefik Middleware)
  middleware:
    compress:
      enabled: false
    httpsRedirect:
      enabled: false
    cors:
      enabled: false
      allowMethods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "PATCH"
        - "OPTIONS"
      allowOriginRegex:
        - ".*"
      allowHeaders:
        - "Authorization"
        - "Content-Type"
        - "Accept"
        - "Origin"
        - "X-Requested-With"
      allowCredentials: true
      maxAge: 86400

  # Ingress configuration (Traefik IngressRoute)
  ingress:
    enabled: false
    entryPoints:
      - websecure
    # Enable sticky sessions (cookie-based session affinity)
    sticky: true
    # Routes define the matching rules and middlewares
    # Use HostRegexp for wildcard matching, Host for exact matching
    routes:
      - match: HostRegexp(`^.+\.veryfront\.com$`)
        middlewares:
          - name: compress
          - name: cors-public-api
      # Additional routes can be added with priority for specific paths
      # - match: Host(`api.veryfront.com`) && PathPrefix(`/special`)
      #   priority: 10001
      #   middlewares:
      #     - name: cors-public-api
    tls:
      enabled: true
      secretName: veryfront-com-wildcard-cert

# veryfront-renderer (formerly renderer-server)
# Handles SSR rendering requests
renderer:
  enabled: true
  replicaCount: 6

  image:
    repository: ghcr.io/veryfront/veryfront-renderer
    pullPolicy: IfNotPresent
    tag: ""

  # Renderer-specific: no MODE needed, it's the default entrypoint

  service:
    type: ClusterIP
    port: 80
    targetPort: 20000

  resources:
    requests:
      cpu: "200m"
      memory: "512Mi"
      ephemeral-storage: "1Gi"
    limits:
      cpu: "1000m"
      memory: "1Gi"
      ephemeral-storage: "2Gi"

  env:
    PORT: "20000"
    # OpenTelemetry tracing
    OTEL_TRACES_ENABLED: "true"
    OTEL_TRACES_EXPORTER: "otlp"
    OTEL_SERVICE_NAME: "veryfront-renderer"
    OTEL_EXPORTER_OTLP_ENDPOINT: "https://otlp-gateway-prod-eu-west-2.grafana.net/otlp"

  envFrom:
    - secretRef:
        name: veryfront-renderer-secret

  readinessProbe:
    tcpSocket:
      port: 20000
    periodSeconds: 10
    timeoutSeconds: 5

  startupProbe:
    tcpSocket:
      port: 20000
    failureThreshold: 30
    periodSeconds: 10

  podAntiAffinity:
    enabled: true
    topologyKey: kubernetes.io/hostname
